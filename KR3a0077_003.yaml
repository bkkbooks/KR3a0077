body:
  text: 理學類編卷三明張九韶撰天文下易豫卦象曰雷出地奮程子曰雷者陽氣奮發隂陽相薄而成聲也陽始潛閉地中及其動則出地奮震也易小畜密雲不雨自我西郊彖曰密雲不雨尚往也自我西郊施未行也程子曰雲隂陽之氣二氣交而和則相畜固而成雨陽唱而隂和順也故和若隂先陽唱不順也故不和不和則不能成雨雲之畜聚雖密而不成雨者自西郊故也東北陽方西南隂方自隂唱故不和而不能成雨又曰凡雨須陽唱乃成隂唱則不成矣今雲過西則雨過東則否是其義也長安西風而雨終未曉此理須是自東自北而風則雨自南自西則不雨何者東北屬陽西南屬隂陽唱而隂和故雨隂唱則陽不和故不雨易言密雲不雨自我西郊自西則是隂先唱也故雲雖密而不雨今西風而雨恐是山勢使然朱子曰密雲不雨自我西郊此是以巽畜乾畜他不得故不能成雨凡雨者是隂氣盛凝結得密方濕潤下降為雨且如飯甑蓋得密了氣鬱不通四畔方有濕汗也又曰密雲不雨尚往也是隂包他不住陽氣便散故雨不成所以尚往也又曰密雲不雨尚往也蓋止是下氣上升所以未能雨必是上氣蔽蓋無發泄處方能有雨易解卦彖曰天地解而雷雨作程子曰天地之氣開散交感而和暢則成雷雨朱子曰隂陽之氣閉結之極忽然迸散出做這雷雨若只管閉結不解散如何會有雷雨作小畜所以不能成雷雨者畜不極也雷便只是如今一箇爆杖詩小雅如彼雨雪先集維霰朱子曰霰雪之始凝者也將大雨雪必先微溫雪自上下遇溫氣而摶則成霰久而寒勝則大雪矣春秋隱公九年春三月癸酉大雨震電庚辰大雨雪胡氏曰震電者陽精之發雨雪者隂氣之凝禮記孔子間居曰天有四時春秋冬夏風雨霜露無非教也地載神氣風霆流形庶物露生無非教也孔氏曰神氣謂神妙之氣於地言神氣者氣從地出又風著於土雷出於地故神氣風霆偏屬於地月令仲春之月雷乃發聲始電孔氏曰雷是陽氣之聲將上與隂相衝蔡雍云季冬雷在地中孟春動於地之上至此升而動於天之下其聲發揚以雷有漸故云乃電是陽光陽微則光不見此月陽氣漸升以擊於隂其光乃見故云始電程子曰電者隂陽相軋雷者隂陽相擊軋者如石相磨而火光出者電便有雷擊者是也問程子以雷是氣相摩軋是否朱子曰然或以為有神物如何曰氣聚則須有然才過便散如雷斧之類亦是氣聚而成者但已有渣滓便散不得又曰電者陽之光陽在外隂有所麗故閃爍而為電問人有不善霹靂震死是人懷不善之心聞霹靂震懼而死否程子曰是雷震之也問有使之者否曰人之作惡與天地之怒氣相擊搏遂以震死霹靂天地之怒氣也如人之怒固自有正然怒時必為之作惡是怒亦惡氣也怒氣與惡氣相感故耳曰雷所擊處必有火何也曰雷自有火動極生陽自然之理程子曰雹者隂陽相搏之氣蓋沴氣也聖人在上無雹雖有不為災按春秋左氏傳昭公四年王正月大雨雹季武子問於申豐曰雹可禦乎對曰聖人在上無雹雖有不為災鄭氏曰雨水陽也雪雹隂也雨水而伏隂薄之則凝而為雹雨雪而愆陽薄之則合而為霰故曰雹沴氣也程子曰易曰雲從龍風從虎龍隂物也出來則濕氣蒸然自出如濕物在日中氣亦自出雖木石之微感隂氣尚亦有氣則龍之興雲不足怪虎行處則風自生程子曰霜露星之氣異乎雨雪又曰霜與露不同霜金氣星月之氣露亦星月之氣看感得甚氣即為露甚氣即為霜或問伊川云露是金之氣如何朱子曰露自是有清肅之氣古語云露結為霜今觀之誠然然露氣與霜氣不同露能滋物而霜殺物也雪霜亦有異霜能殺物而雪不殺物也雨與露不同雨氣昏而露氣清也露與霧不同露氣肅而霧氣昏也張子曰氣坱然大虛升降飛揚未嘗止息虛實動靜之機隂陽剛柔之始浮而上者陽之清降而下者隂之濁其感遇聚結為風雨為霜雪萬品之流行山川之融結糟粕煨燼無非教也張子曰隂性凝聚陽性發散隂聚之陽必散之其勢均散陽為隂纍則相持為雨而降隂為陽得則飄揚為雲而升故雲物班布太虛者隂為風驅斂而未散者也凡隂氣凝聚陽在內者不得出則奮擊而為雷霆陽在外者不得入則周旋不舍而為風其聚有逺近虛實故雷風有小大暴緩和而散則為雪霜雨露不和而散則為戾氣曀霾隂常散緩受交於陽則風雨調寒暑正朱子曰橫渠此論極分曉陽氣正升忽遇隂氣則相持而下為雨蓋陽氣輕隂氣重故陽氣為隂氣壓墜而下也隂氣正升忽遇陽氣則助之飛騰而上為雲也陽氣伏於隂氣之內不得出則爆開而為雷隂氣凝結於內陽氣欲入不得則旋繞其外不已而為風至吹散隂氣乃已戾氣飛雹之類曀霾黃霧之類皆隂陽不正之氣所以雹水穢濁或青黑色邵子曰陽得隂而為雨隂得陽而為風剛得柔而為雲柔得剛而為雷無隂則不能為雨無剛則不能為雷雨柔也而屬隂隂不能獨立故待陽而後興雷剛也而屬體體不能自用必待陽而後發也觀物張氏曰陽唱而隂從則流而為雨隂格而陽薄則散而為風剛唱而柔從則蒸而為雲柔畜而剛動則激而成雷客主後先隂陽逆順不同也風雨自天而降故言隂陽雲雷自地而升故言柔剛天陽也陽必資隂故無隂則不能為雨陽薄隂然後聚而成體也地隂也隂必資陽故無陽則不能為雷隂得陽然後發而成聲也此言隂陽之相資也雨之形柔也屬隂者本乎天之氣也隂不能獨立待陽而興者天之隂資乎天之陽也雷之聲剛也屬體者出乎地之形也體不能自用必待陽而發者地之隂資乎地之陽也邵子曰有雷則有電有電則有風雨生於水露生於土雷生於石電生於火電與風同為陽之極故有電必有風觀物張氏曰雷者震之氣也電者離之氣也風者巽之氣也陽為重隂所制怒氣發而為雷怒而極者為電隂已不能制矣散而為風則反制隂也故風與雷皆為陽之極雨者水之氣蒸則為雲凝則為雪露者土之氣升則為霧結則為霜雷出於石電生於火有雷則有電火出於石也致堂胡氏曰或問雷霆何為而然者有形邪有神邪曰古人未之言也然先達大儒亦嘗明其理矣蓋天地之間無非隂陽聚散闔闢之所為也可以神言不可以形論非如異端所謂龍車石斧鬼鼓火鞭怪誕之難信也故其言曰隂氣凝聚陽在內而不得出則奮擊而為雷霆雖聖人復起不能易矣凡聲陽也光亦陽也光發而聲隨之陽氣奮擊欲出之勢也電緩小則震亦緩小電迅大則震亦迅大震電交至則必有雨震而不電電而不震則無雨由隂氣凝聚之有疏緩迅密也曰世人所得雷斧者何物也曰此猶星隕而為石也本乎天者氣而非形偶隕於地則成形矣然而不盡然也曰雷之破山壞廟折樹殺人者何也曰先儒以為隂陽之怒氣也氣鬱而怒方爾奮擊偶或值之則遭震矣然而不盡然也曰電之閃爍激疾如金蛇飛騰之狀何謂也曰光之發也惟光耳適映雲際則如是不當乎雲之際而在同雲之中則無是矣凡天地造化之迹茍不以理推之必入于幻怪偽誕之説而終不能明故君子窮理之為要也朱子曰雷擊所在只一氣衮來間有見而不為害只緣氣未掤裂有所擊處皆是已發蔡季通云人於雷所擊處拾得雷斧之屬是一氣擊後方始結成不是將這箇來打物見人拾得雷斧如今斧之狀似細黃石或問龍行雨之説朱子曰龍水物也其出與陽氣交蒸故能成雨然雨者隂陽之氣蒸鬱而成非必龍之為也朱子曰如飯甑有蓋其氣蒸鬱而汗下淋漓則為雨如飯甑不蓋其氣散而不收則為霧朱子曰霜只是露結成雪只是雨結成古人云露是星月之氣不然今髙山頂上雖晴亦無露露只是自下蒸上人言極西髙山上亦無霜露或問髙山無霜露其理如何曰上面氣漸清風漸緊雖微有霧氣便吹散了所以不結若雪則是雨遇寒而凝故髙寒處先雪朱子曰雪花所以必六出者六為隂數天地自然之數也太隂玄精石亦六稜朱子曰雪非能為豐年其所以然者以其凝結陽氣在地至來嵗發達而生長萬物也朱子曰風與天相似旋轉未嘗息也今此處無風蓋或旋在他處或旋在上面都不可知如夏多南風冬多北風蓋亦可見真氏曰雷霆雖威初非為殺物設也易稱鼓萬物者莫疾乎雷其與日之烜雨之潤風之散同於生物而已世人惡戾之氣適與之會而震死者有之非雷霆求以殺之也按隋文帝欲以六月殺人大理少卿趙綽爭之帝曰六月豈無雷霆我則天而行有何不可致堂胡氏嘗論之曰雨露猶人君之惠澤雷霆猶人君之號令生成萬物之時固有雷霆而雷霆未嘗殺物隋文取則雷霆而乘怒殺人其違天多矣爾雅曰地氣發而天不應曰霧莊子曰大塊噫氣其名為風作則萬竅怒號淮南子曰天地之氣怒者為風和者為雨隂陽相薄感而為雷激而為霆亂而為霧陽氣勝則散而為雨露隂氣勝則凝而為霜雪劉向曰盛陽雨水溫暖而湯熱隂氣脅之不相入則轉而為雹盛隂雨雪凝滯而氷寒陽氣薄之不相入則散而為霰故沸湯之在閉氣而湛於寒泉則為氷及雪之消亦氷解而散此其驗也韓子曰龍之噓氣成雲雲固弗靈於龍也然龍乘是氣茫茫窮乎玄間薄日月伏光景感震電神變化水下土汩陵谷雲亦靈怪矣哉右論雲雷風雨之屬愚按隂陽之氣流動充滿於天地之間或聚或散或升或降或清或濁或蒸或潤或震擊或凝結為風為雲為雷為電為雨露為霜雪皆是氣也造化之妙豈有出乎隂陽之外者哉蓋其聚則有其散則無聚而為神散而為鬼而風雲雷雨亦各有神以主之故周禮大宗伯有祭風師雨師之禮詩鄘風蝃蝀在東莫之敢指又曰朝隮於西崇朝其雨朱子曰蝃蝀虹也日與雨交倐然成質似有血氣之類乃隂陽之氣不當交而交者蓋天地之淫氣也在東者暮虹也虹隨日所映故朝西而暮東也隮升也注以為虹蓋忽然而見如自下而升也崇終也從旦至食時為終朝言方雨而虹見則其雨終朝而止矣蓋淫慝之氣有害於隂陽之和也今俗謂虹能截雨信然程子曰虹者隂陽二氣之交映日而見張子曰螮蝀者隂氣薄而日氣見也有二其全見者是隂氣薄處不全見者是隂氣厚處朱子曰蝃蝀本是薄雨為日所照成影然亦有形能吸水吸酒人家有此或為妖或為祥問虹霓只是氣還有形質曰既能吸水亦必有形質只才散便無了如雷部神物亦此類蔡雍曰隂陽不和即生此氣虹見有青赤之色常依隂雲而晝見於日衝無雲不見太隂亦不見輒與日相互率以日西見於東方邢氏曰虹雙出色鮮盛者為雄雄曰虹暗者為雌雌曰霓虹是隂陽交會之氣純隂純陽則虹不見若雲薄漏日日照雨滴則虹生趙德麟曰先儒以為日照雨滴則虹生今以水噀日側視之則暈為虹霓然則虹雖天地淫氣不暈於日不成也故雨氣成虹朝陽射之則在西夕陽射之則在東史記天官書曰漢者金之散氣其本曰水晉天文志曰天漢起東方經尾箕之間謂之漢津乃分為二道至天津下而合南道乃西南行至七星南而沒楊泉曰漢者水之精也氣發而升精華浮上宛轉隨流名曰天河一曰天漢右論虹霓河漢愚按虹霓者俗名之曰旱龍以為此物見則雨止故也嘗聞長老言有人雨霽夾溪而行虹起溪中兩人相望如隔紅紗蓋微雨將散為日光所照即成是彩雨散則無矣天河者俗呼為河氣蓋黃河之水精華所發也昔人言天漢與黃河相通亦謂是耳理學類編卷三
