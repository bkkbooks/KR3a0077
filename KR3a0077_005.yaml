body:
  text: 理學類編卷五明張九韶撰鬼神易繫辭曰原始反終故知死生之説精氣為物遊魂為變是故知鬼神之情狀程子曰人能原始知所以生便能要終知所以死又曰原始則足以知其終反終則足以知其始死生之説如是而已矣故必以春為始而原之其必有冬以冬為終而反之其必有春死生者其與是類也或問遊魂為變是變化之變否曰既是變則存者亡堅者腐更無物也又問鬼神果有情狀否曰有之曰既有情狀必有鬼神矣曰易説鬼神便是造化也張子曰精氣者自無而有遊魂者自有而無自無而有神之情也自有而無鬼之情也自無而有故顯而為物神之狀也自有而無故隱而為變鬼之狀也朱子曰原者推之於前反者要之於後隂精陽氣聚而成物神之伸也魂遊魄降散而為變鬼之歸也又曰反只如摺轉來謂推原其始摺轉來看其終如回頭之義是反回來觀其終也精氣為物遊魂為變此是兩箇合一箇離精氣合則魂魄凝結而為物離則陽已散而隂無所歸故為變又曰精氣為物是合精與氣而成氣魂而精魄也遊魂為變則是魂魄相離雖只説遊魂而不言魄而離魄之意自可見矣宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也衆生必死死必歸土是之謂鬼骨肉斃于下隂為野土其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也鄭氏曰氣謂噓吸出入者耳目之聰明為魄隂讀為蔭言人之骨肉蔭於地中為土壤焄謂香臭也蒿謂氣蒸出貌一言衆生此言百物明其與人同也不如人貴耳朱子曰鬼神之露光處是昭明其氣蒸上處是焄蒿使人精神竦動處是悽愴又曰焄蒿是鬼神精氣交感處子曰鬼神之為德其盛矣乎視之而弗見聽之而弗聞體物而不可遺使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右朱子曰為德猶言性情功效鬼神無形與聲然物之終始莫非隂陽合散之所為是其為物之體而物所不能遺也然能使人畏敬奉承而發見昭著如此乃其體物而不可遺之驗也定宇陳氏曰此章自體物而不可遺以上所謂鬼神所包甚濶凡天地造化日月風雨霜露雷霆四時寒暑晝夜潮水消長草木生落人生血氣盛衰萬物生死無非鬼神自使人齊明以下方是就無所不包之鬼神中提出所當祭祀之鬼神來説見得鬼神隨祭而在流動充滿昭著發見無所不在所謂體物而不可遺者可驗於此季路問事鬼神子曰未能事人焉能事鬼敢問死曰未知生焉知死程子曰晝夜者死生之道也知生之道則知死之道盡事人之道則盡事鬼之道死生人鬼一而二二而一者也朱子曰問事鬼神蓋求所以奉承祭祀之意而死者人所必有不可不知皆切問也然非誠敬足以事人則必不能事神非原始而知所以生則必不能反終而知所以死蓋幽明始終初無二理但學之有序不可躐等故夫子告之以此樊遲問知子曰務民之義敬鬼神而逺之可謂知矣程子曰人多信鬼神惑也而不信者又不能敬能敬能逺可謂知矣朱子曰専用力於人道之所宜而不惑於鬼神之不可知知者之事也饒氏曰務民之義敬鬼神而逺之兩句當合看如未病而謹疾有病而問醫此人事之所宜也若不務此而専禱鬼神是不知也為善去惡亦人道之所宜也或者不務為善而専媚神以求福不務去惡而専求神以免禍是不知也夫鬼神謂之無則洋洋如在謂之有則不可度思當於有無間處之程子曰鬼神天地之功用造化之迹也朱子曰功用只是論發見者如寒來暑往日來月往春生夏長皆是又曰風雨露雷日月晝夜此造化之迹也此是公平正直鬼神若所謂嘯于梁觸于胸此則不正邪暗或有或無或去或來或聚或散者又曰古之戰場往往有鬼彼皆強死固宜未散問此亦造化之迹乎曰若論正理則如樹上忽生出花葉空中忽然有雷電風雨此便是造化之迹但人所常見故不之怪忽聞鬼嘯見鬼火則便以為怪不知此亦造化之迹但不是正理故以為妖怪耳張子曰鬼神者二氣之良能也朱子曰良能是説往來屈伸乃理之自然非有安排措置二氣是隂陽良能是其靈處又曰伊川謂鬼神者造化之迹却不如橫渠所謂二氣之良能蓋程子之説固好但只渾淪在這裏張子之説分明便見有箇隂陽在饒氏曰造化之迹指其屈伸者而言二氣良能指其能屈能伸者而言程子説得粗張子説得精程子只説他屈伸之迹不説他靈處又曰良能是指鬼神之性情而言張子曰物之初生氣日至而滋息物生既盈氣日反而遊散至之謂神以其伸也反之謂鬼以其歸也天地不窮寒暑耳衆動不窮屈伸耳鬼神之實不越乎二端而已矣問滋息是生息之息是止息之息朱子曰只是生息又曰人是方生而天地之氣只管增添在身上漸長漸大至極盛了又漸衰耗以至于散平巖葉氏曰物自少以至壯氣日至而滋息息者生而就滿也自壯以至老氣日反而遊散散者消而就盡也張子曰氣於人生而不離死而遊散者魂聚成形質雖死而不散者魄張子曰鬼神往來屈伸之義故天曰神地曰祗人曰鬼神祇者歸之始歸往者來之終朱子曰天下萬物萬事自古及今只是箇隂陽消息屈伸橫渠將屈伸來説鬼神説得變通又曰鬼神屈伸也如風雨雷電初發時神也及風止雨過雷往電息則鬼也又曰鬼神只是氣屈伸往來者氣也天地間無非氣人之氣與天地之氣常相接無間斷人自不見人心才動便達於氣便與這屈伸往來者相感通問來而伸者為神往而屈者為鬼凡隂陽魂魄人之噓吸皆然不獨死者為鬼生者為神故橫渠云神祇者歸之始歸往者來之終曰然問既屈之氣又自有屈伸曰祭祀致得鬼神來格便是既屈之氣又能伸也邵子曰鬼神無形而有用其情狀可得而知也於用則可見之矣若人之耳目鼻口手足草木之枝葉華實顔色皆鬼神之所為也福善禍淫主之者誰邪聰明正直有之者誰邪不疾而速不行而至任之者誰邪皆鬼神之情狀也觀物張氏曰管子云流行於天地之間者謂之鬼神鬼神者太極之英氣正理行乎兩間為天地之用者也氣其狀也理其情也邵子曰氣形盛則魂魄盛氣形衰則魂魄亦從而衰矣魂隨氣而變魄隨形而止故形在則魄存形化則魄散或問死生之説上蔡謝氏曰人死時氣盡也曰有鬼神否曰余當時亦曽問明道先生先生云待向汝道無來汝怎生信得及待向汝道有來汝但去尋討看或問鬼神之説其詳奈何朱子曰鬼神之義孔子所以告宰我者見於祭義之篇其説已詳而鄭氏釋之亦已明矣其以口鼻之噓吸者為魂耳目之精明者為魄蓋指血氣之類以明之程子張子更以隂陽造化為説則其意又廣而天地萬物之屈伸往來皆在其中矣蓋陽魂為神隂魄為鬼是以其在人也隂陽合則魂凝魄聚而有生隂陽判則魂升為神魄降為鬼易大傳所謂精氣為物遊魂為變故知鬼神之情狀者正以明此而書所謂徂落者亦以其升降為言耳若又以其往來者言之則來者方伸而為神往者既屈而為鬼蓋二氣之分實一氣之運故陽主伸隂主屈而錯綜以言亦各得其義焉問鄭氏云口鼻之噓吸者為魂耳目之精明者為魄先生謂此蓋指血氣之類言之口鼻之噓吸是以氣言耳目之精明是以血言目之精明以血言可也耳之精明何故亦以血言朱子曰醫家以耳屬腎精血盛則聽聰精血耗則耳聵矣氣為魂血為魄又問眼體也眼之光為魄耳體也何以為耳之魄曰能聽者便是如老人耳重目昏便是魄漸要散又曰陽魂為神隂魄為鬼鬼者隂之靈神者陽之靈此以二氣言也然二氣之分實一氣之運故凡氣之來而方伸者為神氣之往而既屈者為鬼陽主伸隂主屈此以一氣言也故以二氣言則隂為鬼陽為神以一氣言則方伸之氣亦有伸有屈其方伸者神之神其既屈者神之鬼既屈之氣亦有屈有伸其既屈者鬼之鬼其來格者鬼之神天地神物皆然不離此氣之往來屈伸合散而已此所謂可錯綜而言者也又曰二氣之分即一氣之運以分言之則精為隂而氣為陽故魄為鬼而魂為神以運言之則消為隂而息為陽故伸為神而歸為鬼然魂性動故當其伸時非無魄也而必以魂為主魄性靜故方其歸時非無魂也而必以魄為主則亦初無二理矣朱子曰子産有言物生始化曰魄既生魄陽曰魂蓋嘗推之物生始化云者謂受形之初精血之聚其間有靈者名之曰魄也既生魄陽曰魂者既生此魄便有暖氣其間有神者名之曰魂也二者既合然後有物易所謂精氣為物者是也及其散也則魂遊而為神魄降而為鬼矣北溪陳氏曰所謂始化是胎中略成形時人初間才受得氣便結成箇胚胎模樣是魄既成魄便漸漸會動屬陽曰魂及形既生矣神發知矣故人之知覺屬魂形體屬魄朱子曰天地間如消底是鬼息底是神生底為神死底為鬼四時春夏為神秋冬為鬼人之語為神默為鬼動為神靜為鬼呼為神吸為鬼或問氣魄曰魄屬鬼氣屬神析木煙出是氣滋潤底是魄人之語言動作是氣屬神精血是魄屬鬼發用底皆屬神是氣靜定底皆屬隂是魄知識底是神記事底是魄人初生時氣多魄少後來魄漸盛既老魄又少所以耳聾目昏精力衰記事不定問草木土石有魄而無魂否朱子曰易説精氣為物則是有精氣方有魂魄草木土石不可以魂魄論但出底氣便是魂精便是魄譬如燒香煙便是魂燒出漿汁來是魄魂者魄之光焰魄者魂之根本又問體魄有分别如耳目是體聰明是魄曰然魂者氣之神魄者體之神淮南子注謂魂人陽神魄人隂神此説好問魂魄隂陽之義朱子曰魂如火魄如水又問鬼神便是精神魂魄曰然且就一身看自會笑自有許多聰明知識虛空之中忽然有風雨有雷電這是如何得恁地這都是隂陽相感都是鬼神看得到此見這一身只有箇軀殼在這裏內外無非天地隂陽之氣所以橫渠云天地之塞吾其體天地之帥吾其性只是一箇道理朱子曰魂魄死者之神靈蓋魂神而魄靈魂氣而魄精魂陽而魄隂魂動而魄靜生則魂載其魄魄檢其魂死則魂遊散而歸於天魄淪墜而歸於地也朱子曰精氣就物而言魂魄就人而言鬼神離乎人物而言生則謂之精氣死則謂之魂魄物則謂之鬼神朱子曰魂氣升于天體魄歸于土神氣上升鬼魄下降不特人也凡物之枯敗其香氣騰上物則腐於下又曰天地隂陽之氣交合便成人物氣便是魂精便是魄到得將死熱氣上出所謂魂升下體漸冷所謂魄降或問天地之化雖生生不窮然而有聚必有散有生必有死能原始而知其聚而生必知其後必散而死能知其生也得於氣化之日初無精神寄寓於太虛之中則知其死也與氣俱散無復更有形象尚留於冥漠之內朱子曰死便是都散無了又問遊魂為變間有為妖孽者是如何曰遊字是漸漸散若妖孽者多是不得其死其氣未散故鬱結成妖孽若尫羸病死的人這氣消耗盡了方死豈得更鬱結而成妖孽然不得其死者久之亦散也或問世人有為精怪迷惑此理如何朱子曰家語有之曰山之怪曰夔魍魎水之怪曰龍罔象土之怪曰羵羊皆是氣之雜揉乖亂所生以為無則不可如冬寒夏熱春榮秋枯此理之正也有時忽夏寒冬熱冬月開一朵花豈可謂無此理但非正耳故謂之怪孔子所以不語學者未須理會也叔器問先生前日説日為神夜為鬼所以鬼夜出如何朱子曰間有然者亦不能皆然夜屬隂且如妖鳥皆隂類故皆夜鳴南軒張氏曰鬼神之説合而言之來而不測謂之神往而不返謂之鬼分而言之天地山川風雷之屬凡氣之可接者皆曰神祖考祀享於廟曰鬼就人物言之聚而生為神散而死曰鬼又就一身言之魂氣為神體魄為鬼凡六經所稱蓋不越是數端然一言以蔽之莫非造化之迹而語其德則誠而已北溪陳氏曰自天地言之天屬陽神也地屬隂鬼也就四時言之春夏氣之伸屬神秋冬氣之屈屬鬼又自晝夜分之晝屬神夜屬鬼就日月言之日屬神月屬鬼又如鼓之以雷霆潤之以風雨是氣之伸屬神及至收斂後帖然無蹤迹是氣之歸屬鬼以一日言之則旦起日方升屬神午以後漸退屬鬼如草木生枝生葉時屬神衰落時屬鬼如潮之來屬神潮之退屬鬼凡氣之伸者皆為陽屬神凡氣之屈者皆為隂屬鬼古人論鬼神大槩如此更在人自體究又曰就人身上細論大概隂陽二氣會在吾身之中為鬼神以寤寐言則寤屬陽寐屬隂以語默言則語屬陽默屬隂動靜進退行止皆有隂陽凡屬陽者皆為神為魂凡屬隂者皆為魄為鬼人自孩提至於壯是氣之伸屬神中年以後漸漸衰老是氣之屈屬鬼以生死論則生者氣之伸死者氣之屈就死上論則魂之升者為神魄之降者為鬼魂氣本乎天故騰上體魄本乎地故降下書言帝乃徂落徂是魂之升上落是魄之降下者也勉齋黃氏曰鬼神之説其别有三在天之鬼神隂陽造化是也在人之鬼神人死為鬼是也祭祀之鬼神神示祖考是也三者雖異其所以為鬼神者則同知其異又知其同斯可以語鬼神之道矣魯齋鮑氏曰隂陽二氣散在兩間觸目無非鬼神者不隨他地頭去分别則混為一區幽明惑亂而人道不立矣故在天為日月星辰風雨霜露四時寒暑必有鬼神行乎其間顯然可見書所謂禋於六宗是也自當作一類看在地則五嶽四瀆山君川后能出興雲雨以助化工不可謂無武成所謂所過名山大川是也自當作一類看有功德在民載在祀典如韓子所謂勾龍后稷以功孔子以德為聖為賢歷萬世而不可磨滅者自當作一類看如人死曰鬼氣已散了子孫精誠聚處則祖考來格論語所謂祭如在祭神如神在不特士祭其先為然自天子至於庶人皆有等級分際不可踰越自當作一類看下而至於山夔土羵水罔木妖或懸箕附穎或生霆起鶴天地間自有此等遊魂鬼術足以惑人不可謂無但非正理亦當自作一類看右論鬼神之情狀愚按鬼神之説先儒論之詳矣蓋天地之間隂陽之氣流動充滿莫非鬼神即天地之大言之日月雷電風雲雨露皆鬼神也春夏秋冬晦明晝夜皆鬼神也即人身之微言之動止語默寤寐噓吸皆鬼神也生長老死精氣魂魄皆鬼神也以至山川之融結潮汐之消長皆鬼神也草木之榮枯華實之開落皆鬼神也不此之論而指土木偶人以為神魑魅魍魎以為鬼是皆愚民無知之論曽可以此論正大之鬼神哉子曰非其鬼而祭之諂也朱子曰非其鬼謂非所當祭之鬼諂求媚也南軒張氏曰祀典自天子至於庶人各有其分而不可踰蓋天理也有是理則有是鬼神若於非所當祭而祭焉既無其理何享之有祭如在祭神如神在程子曰祭祭先祖也祭神祭外神也祭先主於孝祭神主於敬范氏曰君子之祭七日戒三日齋必見所祭者誠之至也是故有其誠則有其神無其誠則無其神可不謹乎吾不與祭如不祭誠為實禮為虛也或問名山大川能興雲致雨何也程子曰是氣蒸成耳又問既有氣莫須有神否曰只氣便是神也今人不知此理才有水旱便去廟中祈禱不知雨露是甚物從何處出却於廟中求邪名山大川能興雲致雨却都不説著只於土木人身上求之土木人身上有雨露邪世人只因祈禱有雨遂指為靈豈知適然問先王祭享鬼神則甚謝氏曰是他意思别三日齊五日戒求諸隂陽四方上下蓋是要集自家精神所以王假有廟必於渙與萃言之雖然如是以為有亦不可以為無亦不可這裏有妙理於若有若無間斷制得去始得曰如此却是鶻突也曰不是鶻突自家要有便有要無便無始得鬼神在虛空中辟塞滿觸目皆是為他是天地間妙用祖考精神便是自家精神或問上蔡説鬼神云道有便有道無便無與范氏説有其誠則有其神無其誠則無其神同否朱子曰有其誠則有其神無其誠則無其神便是合有底我若誠則有之不誠則無之合有底當有合無底當無上蔡説得粗了只合當道有底從而有之則有合無底自是無了便從而無之今却只説道有便有道無便無則不可問性即是理不可以聚散言聚而生散而死者氣也所謂精神魂魄有知有覺者氣也故聚則有散則無若理則亘古今常存不復有聚散消長朱子曰只是這箇天地隂陽之氣人與物皆得之氣聚則為人散則為鬼然其氣雖已散這箇隂陽天地之理生生不窮祖考之精神魂魄雖已散子孫之精神魂魄自相屬故祭祀之禮盡其誠敬便可以致得祖考之魂魄這箇自是難説看既散後一似都無了然能盡其誠敬便有感格亦緣是理常只在這裏也問人之死也不知魂魄便散否朱子曰固是散又問子孫之祭祀却有感格者如何曰畢竟子孫是祖先之氣他氣雖散他根却在這裏盡其誠敬則亦能感召得他氣聚在此如水波漾後水非前水後波非前波然却通只是一水波子孫之氣與祖考之氣亦是如此他那氣當下自散了然他根却在這裏根既在此又却能引聚得他那氣在此此事難説要自人看得朱子曰古人到祭祀處便招呼得來問祖先已死以何而來曰只是以我之祭承接其氣便有來底道理又曰人死雖是魂魄各散要之魄又較定須是招魂來復這魄要他相合聖人教人子孫常常祭祀是要聚得他問人之禱天地山川是以我之有感彼之有子孫之祭先祖是以我之有感彼之無朱子曰神祇之氣常屈伸而不已人鬼之氣則消散而無餘然其消散亦有久速之異祭祀之感格或求之隂或求之陽各從其類求則俱來然非有一物積于虛空之中以待子孫之求也但主祭者既是他一氣之流傳則盡其誠敬感格之時此氣固寓此也又問祖考精神便是自家精神故齊戒祭祀則可以來格若旁親外親之屬則其精神非我之精神矣豈於此但以理感之而不以氣乎曰但所祭者其精神魂魄無不感通蓋本從一源中流出初無間斷雖天地山川鬼神亦然也問祭天地山川而用牲幣酒醴者只是表吾心之誠邪抑有其氣來格也朱子曰若道無神來享時自家祭甚底肅然在上令人奉承敬畏是甚物若謂其有雲車風馬擁從而來則又誕矣問鬼神中有謂祖宗是天地間一箇總氣因子孫祭享而聚散朱子曰他這説便是上蔡説道要有時便有道要無時便無是皆由乎人矣鬼神是合有底物事祖宗亦是同此一氣但有箇總腦處子孫這身上祖宗之氣便在此他是有箇血脈貫通所以神不歆非類民不祀非族只為這氣不相關如天子祭天地諸侯祭山川大夫祭五祀雖不是我祖宗然天子者天地之主諸侯者山川之主大夫者五祀之主我主得他他氣便總統在我身上便是箇相關處問祭古聖賢如何曰聖賢道在萬物功在萬世今行聖賢之道傳聖賢之心便是負荷這物事此氣便與相通如釋奠列許多籩豆設許多禮儀不是為此姑謾為之耳問先生所答廖子晦書有云死氣之已散者既化而無有矣而根於理之日生者則固浩然而無窮此莫是説天地之氣否朱子曰此氣只一般雖有天神地示人鬼其實則一若有子孫底固是引得氣聚不成無子孫底氣便絶了他血氣雖不流傳他那生生不已底亦自浩然日生而無窮禮諸侯祭其國之無後者如齊祭爽鳩氏之類蓋他先主此國來理合祭他非在其國便不當祭理合如此便有此氣所以晉侯夢康叔云相奪豫享當祭不祭宜其如此又如晉侯夢黃熊入寢為鯀之神亦是此類不惟有子孫者方有感格其無子孫者氣亦未嘗亡也又問人死氣散若如此説氣又未嘗散也曰如今祭勾芒更是逺只是理合當祭便有此氣要之天地人只是這一氣所以説洋洋如在其上如在其左右虛空拍塞無非此理自要人看得活難以言曉也或問祭夫子不當以塑像只當用木主曰向日白鹿洞欲塑孔子像於殿某謂不必但設一空殿臨時設席祭之不然只塑孔子坐於地上則可用籩豆簠簋今塑像髙髙在上而設器皿於地甚無義理問鬼者隂之靈神者陽之靈司命中霤竈與門行人之所用者有動有靜有行有止故亦有隂陽鬼神之理古人所以祀之然否朱子曰有此物則有此鬼神莫非隂陽之所為也若細分之則户竈屬陽門行屬隂中霤兼統隂陽就一事之中又自有隂陽也問今愚民於村落創立一祠合聚以祈禱之其神便靈何也朱子曰衆心之所輻湊便有生氣所以祭神必用血肉者蓋欲藉他之生氣耳如古人釁廟釁龜之意皆然輔廣曰人心聚處便有神故古人郊則天神格廟則人鬼享亦是此理曰固是但古人之心正故其神亦正後世人心不正故所感無由而正因言古人祭山川只是設壇位以行禮祭時便有祭了便無故不褻瀆後世却先立一箇廟貌在此所以反致惑亂人心幸求非望無所不至北溪陳氏曰大凡不當祭而祭皆曰淫祀淫祀無福由脈絡不相關之故後世祀典只緣佛老亂了如老氏設醮以庶人祭天有何關繫如釋迦本是胡神與中國人何相關只如忠臣義士配享元勳君是已不當祭皆與我無干涉自聖學不明鬼神情狀都不曉如畫星辰都畫箇人以星君目之如泰山曰天齊仁聖帝唐為天齊王至本朝以東方主生加仁聖二字封帝帝只是一上帝而已安有一山而謂之帝今立廟儼然人形貌垂旒端冕衣裳而坐又立后殿於其後不知又是何山可以當其配而為夫婦邪據泰山魯封內惟魯公可以祭今隔一江一淮與南方地脈全不相涉而所在州縣皆髙東嶽行祠亦失於不講明之故南嶽廟向者回祿劉太尉欲再造問於五峯先生先生答以天道人事本一理在天為皇天上帝在人為大君五嶽視三公與皇天上帝並為帝則天道亂矣大君有二則人道亂矣而世俗為貌像為立配為置男女屋而貯之褻瀆神祇之甚南軒又詳之曰川流山峙是其形也而人之也何居其氣之流通可以相接也而宇之也何居皆可謂正大之論可以發愚蒙破聾瞽陳氏又曰江淮以南自古多淫祀以其在蠻夷之域不沾中華禮義狄仁傑毁江淮淫祀一千七百區所存者夏禹伍子胥二廟伊川猶以存伍子胥廟為未是伍子胥可血食於吳而不可血食於楚今去狄公未久而淫祠極多皆緣世教不明而世俗好怪耳今按程子遺書載范文甫赴河清尉問於伊川先生曰到官三日例須謁廟如何伊川曰正者謁之如社稷先聖是也其他古先賢哲亦當謁之又問城隍如何曰城隍不與土地之神社稷而已又問恐駭衆聽曰昔狄仁傑毁江淮淫祠千七百處所存惟吳太伯伍子胥耳今人做不得以謂時不可是誠不然只是無狄仁傑耳當時子胥廟存之亦無謂陳氏又曰後世看理不明諸神廟有靈感響應者則以為英靈神聖之祠在生必聰明正直之人也殊不知此類煞有曲折一樣是富貴權勢等人如伯有為厲子産所謂用物精多則魂魄強之類一樣是壯年蹈白刃而死英魂不散底人一樣是生稟氣厚精神強底人死後未便消散一樣是人塑神像時捉箇生禽獸之猛鷙者如猴鳥之屬生藏於腹中此物皆生被劫而死魂魄不散便會有靈一樣是人心歸以為靈則人精神都聚在那上便自會靈一樣是山川雄峙廟宇坐得其穴其氣自靈又有是人之本心自有靈處自極其誠敬則精神聚會凡所占之事自有脈絡相關便自然感應只緣都是一理一氣所謂齊戒以神明其德即此意唐玄宗好鬼神以太常博士王璵為祠祭使祈禱或焚紙錢類巫覡習禮者羞之致堂胡氏曰古者祭必用幣所以交神猶人之相見有贄以為禮非利之也後世淫祀既衆於是廢幣帛而用楮泉是以賄交於神也使神而果神也夫豈可賄使其不神而可賄也又安用事雖然王璵行之而世以為羞則當時猶未盡用也今舉四海用之而未有革之者不亦悲乎右論祭祀感通之理愚按古人之祭祀鬼神非以求福也將以盡報本之意耳是以竭其誠敬薦其時物而奉其祭祀故能致鬼神之來格後世此理不明其所以事鬼神者既無誠敬之心徒從事於禱祈之語於是古人報本之意亡矣吁理學類編卷五
