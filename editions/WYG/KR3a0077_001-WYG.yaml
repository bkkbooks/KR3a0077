body:
  text: 理學類編卷一明張九韶撰天地易繫辭曰易有太極是生兩儀朱子曰易者隂陽之變太極者其理也又曰太極之義正謂理之極致耳有是理即有是物無先後次第之可言故曰易有太極則是太極乃在隂陽之中而非在隂陽之外也若以乾坤未判大衍未分之時論之恐未安也形而上者謂之道形而下者謂之器今論太極而以天地未分元氣合而為一者言之亦恐未安也有是理即有是氣理一而已氣則無不兩者故曰太極生兩儀今按孔氏正義曰太極謂天地未分之前元氣混而為一則是認太極為氣矣故朱子辨之周子曰無極而太極太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根分隂分陽兩儀立焉朱子曰無極而太極是無形之中有箇極至之理又曰太極只是天地萬物之理未有天地之先畢竟是先有此理動而生陽亦只是理靜而生隂亦只是理又曰太極理也動靜氣也氣行則理亦行二者常相依而未嘗相離也又曰當初元無一物只有此理有此理便㑹動而生陽靜而生隂靜極復動動極復靜循環流轉其實理無窮氣亦與之無窮自有天地便是這物事在這裏流轉一日有一日之運一月有一月之運一嵗有一嵗之運只是這箇物事衮衮將去又曰太極動而生陽是且從動處説起其實動前是靜靜前又是動如晝而夜夜而晝晝前已有夜夜前已有晝或問太極之有動靜是動先靜後否曰動靜無端隂陽無始不可分先後今此只是就起處言之畢竟動前是靜靜前又是動將何者為先後不可只道今日動便為始而昨日靜更不説也如鼻息言呼吸則辭順不可道吸呼畢竟呼前又是吸吸前又是呼邵子曰或曰顛然而髙者吾知其為天也隤然而下者吾知其為地也吾不知天地之前何物也曰夫無者從而有者也有者反而無者也清濁混而為一是謂太極太極者己見氣也太極判兩儀生太極者謂之有邪謂之無邪太極者一氣也謂之一非無數也乃數之始謂之氣非無象也乃象之始安可謂之無哉然太極之所以判兩儀之所以分者孰使之然邪其所以然而然者由道之變也朱子曰周子邵子説太極是和隂陽衮説易中便擡起説周子言太極動而生陽靜而生隂動時便是陽之太極靜時便是隂之太極蓋太極即在隂陽裏如易有太極是生兩儀則先從實理處説若論其生則俱生但言其次序須有這理方始有隂陽也其理則一雖然自見在事物觀之則隂陽函太極推其本則太極生隂陽西山真氏曰自周子以前凡論太極皆以氣言莊子以道在太極之先所謂太極乃是指作天地人三者氣形已具而渾淪未判者之名而道又别是一懸空底物在太極之先則道與太極為二矣不知道即太極太極即道以其理之通行者而言則曰道以其理之極至者而言則曰太極又何嘗有二邪倘非周子啓其秘而朱子闡而明之孰知太極之為理而非氣哉今按邵子之説太極亦以氣言之故備載西山之説于此讀者當自擇焉邵子曰一氣分而為隂陽判得陽之多者為天判得隂之多者為地又曰天生乎動者也地生乎靜者也一動一靜交而天地之道盡之矣又曰人皆知天地之為天地也而不知天地之所以為天地也如欲知天地之所以為天地捨動靜將奚之焉朱子曰天地初間只是隂陽二氣這一箇氣運行磨來運去磨得急了拶得許多查滓在裏面無出處便結成地在中央氣之清者便為天為日月為星辰只在外常周環運轉地便只在中央不動不是在下朱子曰天地始初混沌未分時想只是水火二者水之滓脚便成地今登髙而望羣山皆為波浪之狀只不知因甚麽時凝了初間極軟後來方凝得硬問想得如潮來湧起沙相似曰然水之極濁便成地火之極清便成風霆雷電日星之屬朱子曰方渾淪未判隂陽之氣混合幽暗及其既分中間放得寛闊光朗而兩儀始立邵康節以十二萬九千六百年為一元則是十二萬九千六百年之前又是一箇大闔闢更以上亦復如此直是動靜無端隂陽無始小者大之影只晝夜便可見五峯所謂一氣大息震蕩無垠海宇變動山勃川湮人物消盡舊跡大滅是謂鴻荒之世嘗見髙山有螺蜯殻或生石中此石即舊日之土螺蜯即水中之物下者却變而為髙柔者却變而為剛此事思之至深有可驗者朱子曰天運不息晝夜輥轉故地𣙜在中間使天有一息之停則地須陷下惟天運轉之極故凝得許多渣滓在中間地者氣之渣滓也朱子曰陽變隂合初生水火水火氣也流動閃爍其體尚虛其成形猶未定次生木金則確然有定形矣水火初是自生木金則資於土五行之屬皆從土中施生出來程子曰坎水也一始於中有生之最先者也魯齋鮑氏曰物之初生其形皆水水者萬物之一原皆根於天一之造化夫金石之産其初亦乳一陽之氣一日之時一年十一月冬至皆肇於子子者水位也夫水生於陽而成於隂氣始動而陽生氣聚而靜則成水觀呵氣可見葢生水之初屬一故微至成水時則六矣或問曰天一生水亦有物可驗乎曰人之一身可驗矣貪心動則津生哀心動則淚生愧心動則汗生慾心動則精生方人心寂然不動之時則太極也此心之動則太極動而生陽也所以心一動而水生即可以為天一生水之證神為氣主神動則氣隨氣為水母氣聚則水生也朱子曰天數九重漸漸上去氣愈髙愈清只是箇旋風就外面旋來旋去旋出渣滓在中間成地魯齋鮑氏曰天非若地之有形也地之上無非天減得一尺地便有一尺天人自不覺耳輕清上浮者為天天圓而動包著箇地地方而靜在天之中所以重濁下沉者皆天氣之渣滓凝聚於下者也原其初則一氣而已一分為二陽得兼隂是以乾天之一包坤地之二而為三地在天中地之氣皆天之氣也朱子曰邵子皇極經世書以元統十二㑹為一元一萬八百年為一㑹初間一萬八百年而天始開又一萬八百年而地始成又一萬八百年而人始生邵子於寅上方始註一開物字葢初間未有間只是氣塞及天開些子後便有一塊渣滓在其中漸漸凝結而成地初則溶軟後漸堅實今山形自髙而下便如水漾沙之勢以此知必是先有天方有地有天地交感方始生出物來草廬吳氏曰一元凡十二萬九千六百嵗分為十二㑹一㑹計一萬八百嵗天地之運至戌㑹之中為閉物兩間人物俱無矣如是又五千四百年而戌㑹終自亥㑹始五千四百年當亥㑹之中而地之重濁凝結者悉皆融散與輕清之天混合為一故曰渾沌清濁之混逐漸轉甚又五千四百年而亥㑹終昏暗極矣是天地之一終也貞又起元又肇一初為子㑹之初仍是混沌是謂大始言一元之始也是謂太一言清濁之氣混合為一而未分也自此逐漸開明又五千四百年當子㑹之中輕清之氣騰上有日有月有星有辰日月星辰四者成氣而共為天故曰天開於子濁氣雖摶在中間然未凝結堅實故未有地又五千四百年而子㑹終又自丑㑹之始五千四百年當丑㑹之中重濁之氣凝結者始堅實而成土石濕潤之氣為水流而不凝燥烈之氣為火顯而不隱水火土石四者成形而共為地故曰地闢於丑又五千四百年而丑㑹終又自寅㑹之始五千四百年當寅㑹之中兩間人物始生故曰人生於寅也或問三統朱子曰諸儒之説為無據看來只是當天地肇判之初天始開當子位故以子為天正其次地始闢當丑位故以丑為地正惟人最後方生當寅位故以寅為人正即邵康節十二㑹之説當寅位則有所謂開物當戌位則有所謂閉物閉物即是天地之間都無物了看他説便須天地翻轉數十萬年雙峯饒氏曰當初只是一氣清濁混沌濁者沈清者浮濁自濁清自清此是天開於子其時雖已有地而未成質到丑上方堅實有山川之類方是地闢到寅上人始生問以皇極經世觀之自子至丑丑至寅年嵗極多不應天地人如此隔絶曰且論其理那箇是數或問天開於子地闢於丑人生於寅是如何朱子曰此是邵子皇極經世中説今不可知他只是以數推得如此他説寅上生物是到其上方有人物也有一元十二㑹三十運十二世十二萬九千六百年為一元嵗月日時元㑹運世皆自十二而三十自三十而十二至堯時㑹在己午之間今漸及未矣至戍上説閉物到那裏則不復有人物矣問不知人物消磨盡時天地壞也不壞曰也須一場鶻突既有形氣如何得不壞但一箇壞了便有一箇生得來觀樂黄氏曰堯之時在日甲月己星癸辰申當十二萬九千六百年之半以上為六萬四千八百年之已往以下為六萬四千八百年之方來是以謂堯得中數也袁明善曰禹即位後八年得甲子初入午㑹前至元元年甲子初入午㑹第十一運從天開甲子至泰定甲子得六萬八千八百二十一年雙湖胡氏曰今當一元之午㑹癸運酉世即一嵗之五月初十日酉時也今按邵子皇極經世書一元統十二㑹一㑹統三十運一運統十二世猶一嵗有十二月一月有三十日一日有十二時故西山蔡氏曰一元之數即一嵗之數也一元有十二㑹三百六十運四千三百二十世猶一嵗十二月三百六十日四千三百二十辰也前六㑹為息後六㑹為消即一嵗自子至己為息自午至亥為消也開物於寅猶嵗之驚蟄也閉物於戍猶嵗之立冬也一元有十二萬九千六百嵗一㑹有十二萬九千六百月一運有十二萬九千六百日一世有十二萬九千六百辰皆自然之數非有所牽合也知此則知皇極經世之㫖矣右論天地之始終或曰天地亦有終始乎邵子曰既有消長豈無終始天地雖大是亦形氣之二物也愚按先儒之論天地之初混沌鴻䝉清濁未判但一氣耳及其乆也其運轉於外者漸漸輕清其凝聚於中者漸漸重濁輕清者積氣成象而為天重濁者積氣成形而為地天之成象者日月星辰是也地之成形者水火土石是也天包地外旋繞不停地處天内安靜不動天之旋繞其氣急勁故地浮載其中不陷不墜岐伯所謂大氣舉之是也邵子曰天何依曰依乎地地何附曰附乎天曰然則天地何所依附曰自相依附天依形地附氣其形也有涯其氣也無涯有無之相生形氣之相息終則有始終始之間天地之所存乎朱子曰康節此言天依形地附氣所以重複而言不出此意者惟恐人於天地之外别尋去處故也天地無外所以其形有涯而其氣無涯也為其氣極𦂳故能扛得箇地住不然則墜矣外更須有軀殻甚厚所以固此氣也若夫地動只是一處動動亦不至逺也又曰康節此説古今歴家所未及邵伯温曰伊川先生見康節先生伊川指食桌而問曰此桌安在地上不知天地安在甚處康節為之極論其理以至六合之外伊川嘆曰平生惟見周茂叔論至此然不及康節之詳也或問邵子論六合之外恐無外否朱子曰理無内外六合之形須有内外日月東升西沒又從東升這上面許多下面亦許多豈不是六合之外今歴家只算到日月星辰運行處上去更算不得安得是無内外邵子曰天圓而地方天北髙而南下是以望之如倚蓋焉地東南下而西北髙是以東南多水西北多山也天覆地地載天天地相函故天下有地地上有天觀物張氏曰天圓如虚毬地斜隔其中西北之髙戴乎天頂故北極出地纔三十六度降及東南履乎天末故南極入地亦三十六度東南多水西北多山其髙卑可見矣地勢本傾峻以其體大故人居其上而弗覺西北負實東南面虛也人倚北而面南是以天潜乎北而顯乎南水發乎西而流乎東也天包地地載天天地相函以立於太虛之中而能終古不壞故在天成象則在地成形仰天有文則俯地有理人能窮此可以達性命之原知生死之説矣程子曰地之下豈無天今所謂地者特天中一物耳凡有氣莫非天有形莫非地程子曰天地動靜之理天圓則須轉動地方則須安靜南北之位豈可不定致堂胡氏曰夫天非若地之有形也自地而上無非天者昔人以積氣名其象以倚蓋名其形皆非知天者莊周氏曰天之蒼蒼其正色邪言天無色也無色則無聲無臭皆舉之矣日月星辰之繫乎天非若山川草木之麗乎地也著明森列躔度行止皆氣機自運莫使之然而然者無所託也若其有託則是以形相屬一麗乎形能無壞乎西山真氏曰按陽倞註荀子亦曰天無實形地之上空虚者皆天也朱子曰天之形圓如彈丸朝夜運轉其南北兩端後髙前下乃其樞軸不動之處其運轉者亦無形質但如勁風之旋當晝則自左旋而向右向夕則自前降而歸後當夜則自右轉而復左將旦則自後升而趨前旋轉無窮升降不息是為天體而實非有體也地則氣之渣滓聚成形質者但以其束於勁風旋轉之中故得以兀然浮空甚乆而不墜耳昔黄帝問於岐伯曰地有慿乎岐伯曰大氣舉之亦謂此也其曰九重則自地之外氣之旋轉益逺益大益清益剛究陽之數而至於九則極清極剛而無復有涯矣朱子曰天轉也非自東面西也非旋環磨轉却是側轉今按先儒謂天左旋者背北面南視之則其運如絡絲背東面西視之則其運如轉車是也或問天行健朱子曰惟胡安定説得好其言曰天者乾之形乾者天之用天形蒼然南樞入地下三十六度北樞出地上三十六度狀如依杵其用則一晝夜行九十餘萬里人一呼一吸為一息一息之間天行已八十餘里人一晝夜有一萬三千六百餘息故天行九十餘萬里天之行健可知因言天之氣運轉不息故閣得地在中間或未達曰如㺯椀珠底只恁運轉不住故在空中不墜少息則墜矣今按丹書言人一晝夜有一萬三千五百息一千一百二十五息乃應一時胡氏之言蓋取諸此或問天地之所以髙深朱子曰公且説天是如何後髙天只是氣非獨是髙只今人在地上便只見如此髙要之他連地下亦是天天只管旋來轉去天大了故旋得許多渣滓在中間世間無一箇物事大故地恁大地只是氣之渣滓故厚而深也朱子曰地却是有空缺處天則四方上下都周匝無空缺偪塞滿皆是天地之四向底下却靠著天天包地其氣無不通恁地看來渾只是天氣却從地中迸出又見地之廣處横渠云地對天不過胡用之問易本義云乾一而實故以質言而曰大坤二而虛故以量言而曰廣朱子曰此兩句説得極分曉蓋曰以形言之則天包地外地在天中所以説天之質大以理與氣言之則天之氣却盡在地之中地盡承受得天之氣所以説地之量廣天只是一箇物事一故實從裏面便實出來流行發生只是一箇物事所以説乾一而實地雖堅實然却虛天之氣流行乎地之中皆從裏面發出來所以説坤二而虚用之云地如肺形質雖硬而中本虛故陽氣升降乎其中無所障礙雖金石也透理去地便承受得這氣發育萬物曰然要之天形如一箇鼓鞴天便是那鼓鞴外面皮殻子中間包得許多氣開闔消長所以説乾一而實地中間盡是這氣來往升降緣中間虛故容得這氣來往升降以其包得地所以説其質之大以其容得天之氣所以説其量之廣非是説地之形有盡故以量言也只是説地盡容得天之氣所以説其量之廣耳今歴家用律呂候氣其法最精氣之至也分寸不差便是這氣都在地中透出來如十一月冬至用黄鐘管距地九寸以葭灰實其中至之日氣至灰去晷刻不差朱子曰周禮註土圭一寸折一千里天地四遊升降不過三萬里土圭之景尺有五寸折一萬五千里以其在地之中故南北東西相去各三萬里問何謂四遊曰謂地之四遊升降不過三萬里非謂天地中間相去止三萬里也春遊過東三萬里夏遊過南三萬里秋遊過西三萬里冬遊過北三萬里今歴家算數如此以土圭測之皆合曰譬如大盆盛水而以虛器浮其中四邊定四方若器浮過東三寸以一寸折萬里則去西三寸亦如地之浮於水上蹉過東方三萬里則逺去西方亦三萬里矣南北亦然然則冬夏晝夜之長短非日晷出沒之所為乃地之遊轉四方而然耳曰然曰人如何測得如此恐無此理曰雖不可知然歴家推算其數皆合恐有此理也今按鄭氏曰地厚三萬里春分之時地正當中自此漸漸而下至夏至地下萬五千里地之上畔與天中平夏至之後地漸漸而上至秋分地正當天之中央自此地漸漸而上至冬至上遊萬五千里地之下畔與天中平自冬至後地又漸漸而下此所謂地升降於三萬里中也朱子曰天無體只二十八宿便是體今按爾雅疏亦曰天是太虛本無形體但指諸星運轉以為天耳或問天有質否抑只是氣朱子曰只是箇旋風下耎上堅道家謂之剛風人常説天有九重分九處為號非也只是旋有九耳但下面氣較濁而暗上面至髙處則至清至明耳問晉志論渾天以為天外是水所以浮天而載地是如何朱子曰天外無水地下是水載朱子曰天以氣而依地之形地以形而附天之氣天包乎地地特天中之一物耳右論天地之形體北溪陳氏曰天即理也古聖賢説天多是就理上論理無形狀以其自然而言故謂之天若就天之形體論也只是箇積氣恁蒼蒼茫茫實有何形體餘説見下段朱子曰尚書璣衡疏載王蕃渾天説一段極精密其説曰天之形狀似鳥卵地居其中天包地外猶殻之裹黄圓如彈丸故曰渾天言其形體渾渾然也其術以為天半覆地上半在地下其天居地上見者一百八十二度半强地下亦然北極出地上三十六度南極入地下亦三十六度而嵩髙正當天之中極南五十五度當嵩髙之上又其南十二度為夏至之日道又其南二十四度為春秋分之日道又其南二十四度為冬至之日道南下去地三十一度而已是夏至日北去極六十七度春秋分去極九十一度冬至去極一百一十五度此其大率也南北極持其兩端其天與日月星宿斜而迴轉也或問北辰之為天樞何也朱子曰天圓而動包乎地外地方而靜處乎天中故天之形半覆地上半繞地下而左旋不息其樞紐不動之處則為南北極謂之極者猶屋脊謂之屋極也然南極低入地三十六度故周囘七十二度常隱不見北極髙出地三十六度故周囘七十二度常見不隱北極之星正在常見不隱七十二度之中常居其所而不動其傍則諸星隨天左旋更迭隱見皆若環繞而歸向之知此則知天樞之説矣朱子曰南極在地下中處北極在地上中處南北極相對天雖轉極却在中不動朱子曰南極上下七十二度常隱不見唐書説常有人至海上見南極下有數大星甚明此亦在七十二度之内黄義剛問如説南極見老人星則是南極也解見朱子曰南極不見是南邊自有一箇老人星南極髙時也解浮得起來或問北辰朱子曰北辰是天之樞紐中間些子不動處緣人要取此為極不可無箇記認所以就其傍取一小星謂之極星天之樞紐如門簨子相似又似箇輪藏心藏在外面動心却不動又問極星動不動曰極星也動只是他近那辰故雖動而不覺如射糖盤子様北辰便是中心樁子極星便是近樁底㸃子雖是也隨盤轉緣近樁子便轉得不覺向來人説北極便是北辰皆只説北極不動至本朝人方推得是北極只在北辰邊頭而極星依舊動朱子曰史記載北極有五星太一常居中是極星也辰非星只是中間界分也其極星亦微動惟辰不動乃天之中猶磨之心也今按史記天官書中宫天極星其一明者太一常居也註云北極其星五在紫㣲中或問上蔡謂北極天之樞也以其居中故謂之北極以其周建於十二辰之舍故謂之北辰是否朱子曰以其居中不動衆星環向為天樞軸天形如鷄子旋轉極如一物横亘在中兩頭抨定一頭在北上為北極一頭在南下為南極問太一曰太一是帝座即北極也以星辰之位言之謂之太一以其所居之處言之謂之北極太一如人主北極如帝都又曰帝座惟在紫微者據北極七十二度常見不隱之中故有北辰之號而常居其所蓋天形運轉晝夜不息而此為之樞如輪之轂如磑之臍雖欲動而不可得非有意於不動也朱子一日論黄赤道日月躔度潘子善曰嵩山本不當天之中為是天形敧側遂當其中耳朱子曰嵩山不是天之中乃是地之中黄道赤道皆在嵩山之北南極北極天之樞紐只此處不動如磨心然此是天之中至極處如人之臍帶也緣督趙氏曰古人仰視天象遂知夜乆而星移斗轉漸漸不同昏暮東出者曉則西墜昏暮不見者曉則東升北天之星雖然旋轉未嘗入地四時皆見其徹夜在天然其旋轉有甚窄者以衡管窺之衆星無有不轉但有一星旋轉最密循環不出於管中名曰紐星者是也古人以旋磨比天則磨臍比為天之不動處此即紐星旋轉之所名曰北極亦猶車輪之中軸瓜瓣之攢頂也復觀南天雖無徹夜見者但比東西星宿旋轉則不甚逺由是而推乃是南北俱各有極北極在地平之上南極在地平之下今比北極為瓜之聯蔓處南極為瓜之有花處東西旋轉最廣之所比乎瓜之腰圍北極邊傍雖然旋轉常在於天南極則近雖然旋轉不出於地如是則知地在天内天如雞子地如中黄然雞子形不正圓古人非以天形相肖而比之但喻天包地外而已以此觀之天如蹴毬内盛半毬之水水上浮一木板比似人間地平板上雜置㣲細之物比如萬類蹴毬雖圓轉不已板上之物俱不覺知謂天體旋轉者天非可見其體因衆星出没於東西管轄於兩極有常度無停機遂即星所附麗擬以為天之體耳右論南北極為天之樞紐愚按先儒之説天形至圓如虛毬地隔其中人物生於地上地形正方如博骰日月星辰旋繞其外自左而上自上而右自右而下自下而復左天形如勁風之旋其兩端不動處曰極上頂不動處謂之北極下臍不動處謂之南極南北二極相去之中天之腰也謂之赤道日所行之道謂之黄道春秋二分黄道正與赤道相直故其出沒正與地之卯酉相當是以晝夜均平春分以後行赤道北夏至則去北極最近故曰日北至而其出入與地之寅戌相當是以景短而晷長晝刻多而夜刻少夏至以後又移而南至秋分又與赤道相直秋分以後行赤道南冬至則去南極最近故曰日南至而其出沒與地之辰申相當是以景長而晷短晝刻少而夜刻多冬至以後又移而北至春分又與赤道相直日極於南而復北則為冬至上年冬至至下年日道極南復北之時三百六十五日餘三時不滿故天度一周之時三百六十五日四分日之一而有餘日道一周之時三百六十五日四分日之一而不足天度有餘日道不足故六十餘年之後冬至所直天度率差一度是謂嵗差按堯典堯時冬至日在虚七度至月令時該一千九百餘年冬至日在斗一十二度至元朝初又該一千七百餘年冬至日在斗初度由元初至今又百餘年而冬至日在箕八度矣以此推之則嵗差之説信然理學類編卷一
