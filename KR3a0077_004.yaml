body:
  text: 理學類編卷四明張九韶撰地理屈子天問九州安錯川谷何汙東流不溢孰知其故朱子曰錯置也汙深也水注海曰川注川曰溪注溪曰谷此章三問今答之曰九州所錯天地之中也川谷之汙衆流之會也不溢之故則列子曰渤海之東不知幾億萬里有大壑焉實惟無底之谷名曰歸墟八紘九野之水天漢之流莫不注之而無增無減焉莊子曰天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時已而不虛柳子曰東窮歸墟又環西盈脈穴土區而濁濁清清墳墟燥疏滲渴而升充融有餘泄漏復行器運浟浟又何溢焉三子之言遞相祖述而柳又明歸墟之泄非出之天地之外也但水入於東而復繞於西又滲縮而升乃復出於髙原而下流於東耳此其説亦近似矣然以理驗之則天地之化往者消而來者息非以往者之消復為來者之息也水流東極氣盡而散如沃焦釡無有遺餘故歸墟尾閭亦有沃焦之號非如未盡之水山澤通氣而流注不窮也又問東西南北其修孰多南北順橢其衍幾何朱子曰修長也橢狹而長也衍餘也此問四方長短若何若謂南北狹而長則其長處所餘又計多少也答曰地之形量固當有窮但既非人力所能遍歷算術所能推知而書傳臆説又不足信惟靈憲所言八極之廣原於歷算若有據依然非專言地之廣狹也柳對直謂其極無方則又過矣問周公定豫州為天地之中東西南北各五千里今其邊無極而南方交趾際海道里敻殊何以云各五千里朱子曰此但以中國地段四方相去言之未説極邊與際海處南邊雖近海然地形則未盡如海外有島夷諸國則地雖連屬彼處海猶有底至海無底處地形方盡周公以土圭測天地之中則豫州為中而南北東西際天各逺許多至於北逺而南近則地形有偏耳所謂地不滿東南也或問周禮以土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂鄭注云日南謂立表處太南近日也日北謂立表處太北逺日也景夕謂日昳景乃中立表處太東近日也景朝謂日未中而景中立表處太西逺日也朱子曰景夕多風景朝多隂此二句鄭注不可非但説倒了看來景夕者景晚也謂日未中而景已中蓋立表處近南則取日近午前景短而午後景長也景朝者謂日已過午而景猶未中蓋立表太北而取日逺午前景長而午後景短也問多隂多風之説曰今近東之地自是多風如海邊諸郡極多風每如期而至如春必東風夏必南風不如此間之無定蓋土地曠濶無髙山之限故風各以其方至某舊在漳泉驗之早間則風始生至午而盛午後則風力漸微至晚則更無一點風色未嘗少差蓋風隨陽氣生日方升則陽氣生至午而陽氣盛午後則陽氣微故風亦從而盛衰如西北邊多隂非特山髙障蔽之故自是陽氣到彼處衰謝蓋日到彼方午則彼已甚晚不久即落故西邊不甚見日古語云蜀之日越之雪言其少也所以蜀有漏天言其地多雨如天漏然以此觀之天地之不甚濶以日月所照及寒暑風隂觀之可以驗矣朱子曰河圖言崑崙者地之中也地下有八柱互相牽制名山大川孔穴相通素問曰天不足西北地不滿東南注云中原地形西北髙東南下今百川滿湊東之滄海則東西南北髙下可知矣或問天竺國去處極濶朱子曰以崑崙山言之天竺直崑崙之正南所以土地濶而所生亦多異人水經云崑崙取嵩山五萬里看來不會如此逺蓋中國至于闐二萬里于闐去崑崙無緣更有三萬里文昌雜録記于闐遣使來貢獻使者自言其西千三百餘里即崑崙山今中國在崑崙之東南而天竺諸國在其正南水經又云黃河自崑崙東北流入中國如此則崑崙當在西南上或又云西北不知如何恐河流曲折多入中國後方見其東北流耳佛書所説阿耨山者即崑崙也云山頂有阿耨大池水分流四面去為四大水入中國者黃河入東海其三面各入南西北海如弱水黑水之類大抵地形如饅頭其撚尖則崑崙也朱子曰自古無人窮至北海想北海只挨著天殼邊過緣北邊地長其勢北海不甚濶地之下與地之四邊皆海水周流地接水上與天接天包水與地問佛家所謂天地四州之説果有之否曰佛書有之中國為南禪部州天竺諸國皆在南禪部州東弗于逯西瞿耶厄北鬱單越亦如鄒衍所説赤縣之類四州統名娑婆世界如是世界凡有幾所而娑婆世界獨居其中其形正圓故所生人物亦獨圓正象其地形蓋得天地之中氣其他世界則形皆偏側尖缺而環處娑婆世界之外不得天地之正氣故所生人物亦多不正但其言日初出時先照娑婆世界故其氣和其他世界則日之所照或正或昃故氣不和只他此説便自可破彼言日之所照必經歷諸世界了然後入地則一日之中須歷照四處方得周匝今才照得娑婆一處即已曛黑若更照其他三處經多少時節如此則夜須極長何故今中國晝夜有均停時而冬夏漏刻長短相去亦不甚逺其説於是不通矣朱子曰分野之説始見於春秋時而詳於漢志然今左傳所載大火辰星之説又却只因其國之先曾主二星之祀而已是時又未有所謂趙魏晉者然後來占星者又却有驗殊不可曉魯齋鮑氏曰分星禮經所載不可磨也其説有三伶州鳩曰嵗星所在則我之分野古堪輿書亡後郡國所入非古嵗星或北或西與古受封所在不同一也唐虞及夏萬國殷周千七百國並依附十二州以係十二次之星法先王命親之意以主祀為重如封閼伯商丘主辰為商星商人是因封實沈大夏主參為夏星唐人是因唐後為晉參為晉星二也今以分野次舍考之青州在東玄枵却在北雍州在西鶉首却在南以至揚東南星紀在北冀東北大梁在西徐東降婁西豫與三河居中大火在正東鶉火在南此躔次之最差者也三説不同識者當自擇之今按周禮春官保章氏以星土辨九州之地所封封域皆有分星以觀妖祥鄭氏注星土星所主土也封猶界也十二次之分星紀吳越也玄枵齊也娵訾衛也降婁魯也大梁趙也實沈晉也鶉首秦也鶉火周也鶉尾楚也壽星鄭也大火宋也析木燕也此分野之妖祥主用客星彗孛之氣為象朱子曰冀州正是天地中間好風水山脈從雲中發來雲中正髙脊處自脊以西之水則西流入于龍門西河自脊以東之水則東流入于海前面一條黃河環繞右畔是華山自華來至中為嵩山是謂前案遂過去為泰山聳于左淮南諸山為第二重案江南諸山為第三重案或問天下之山西北最髙朱子曰然自關中一支生下函谷以至嵩少東盡泰山此是一支又自嶓冢漢水之北生下一支至揚州而盡江南諸山則又自岷山分一支以盡乎兩浙閩廣朱子曰大凡兩山夾行中間必有水兩水夾行中間必有山江出岷山岷山夾江兩岸而行那邊一支去為江北許多去處這邊一支為湖南又一支為建康又一支為福建二廣朱子曰岷山之脈其一支為衡山者已盡於九江之西其一支又南而東度桂嶺者則包湘源而北徑袁潭之境以盡於廬阜其一支又南而東度大庾嶺者則包彭蠡之源以北盡於建康其一支則又東包浙江之源而北其首以盡會稽南其尾以盡乎閩粵也朱子曰江西山皆是五嶺贑上來自南而北故皆逆閩中山却是自北而南故皆順又曰閩中之山多自北來水皆東南流江浙之山多自南來水多北流九峯蔡氏曰河北諸山根本脊脈皆自代北寰武嵐憲諸州乘髙而來其脊以西之水則西流以入龍門西河之上流其脊以東之水則東流而為桑乾幽冀以入于海其西一支為壺口太嶽次一支包汾晉之源而南出以為析城王屋而又西折以為雷首又次一支乃為大行又次一支乃為恆山此大河北境之山也其江漢南境之山則岷山之脈其北一支為衡山而盡於洞庭之西其南一支度桂嶺北經袁筠之地至德安之敷淺原二支之間湘水間斷衡山在湘水西南敷淺原在湘水東北孔氏以為衡山之脈連延而為敷淺原者非也右論地理之廣闊愚按淮南子地形訓言闔四海之內東西二萬八千里南北二萬六千里禹乃使大章步自東極至于西極二億三萬三千五百里七十五步使豎亥步自北極至于南極二億二萬三千五百里七十五步此皆荒誕無稽之語故今不取程子曰今夫海水潮日出則水涸是潮退也其涸者已無也月出則潮水復生却不是將已涸之水為潮水自然能生也邵子曰海潮者地之喘息也所以應月者從其類也朱子曰潮汐之説余襄公言之尤詳大抵天地之間東西為緯南北為經故子午卯酉為四方之正位而潮之進退以月至此位為節耳以氣之消息言之則子者隂之極而陽之始午者陽之極而隂之始卯為陽中酉為隂中也今按余襄公安道之言曰潮之漲退海非增減蓋月之所臨則水往從之日月右轉而天左旋一日一周臨於四極故月臨卯酉則水漲乎東西月臨子午則潮平乎南北彼竭此盈往來不絶皆繫於月何以知其然乎夫晝夜之運日東行一度月行十三度有竒故太隂西沒之期常緩於日三刻有竒潮之日緩其期率亦如是自朔至望常緩一夜潮自望而晦復緩一晝潮朔望前後月行差疾故晦前三日潮勢長朔後三日潮勢大望亦如之月弦之際其行差遲故潮之去來亦合沓不盡盈虛消息一之於月隂陽之所以分也夫春夏晝潮常大秋冬夜潮常大蓋春為陽中秋為隂中嵗之有春秋猶月之有朔望也故潮之極漲常在春秋之中潮之極大常在朔望之後此又天地之常數也古州馬氏曰禮記朝日曰朝致月曰夕江海之水朝生為潮夕至為汐日太陽也歷一次而成月月太隂也合於日以起朔隂陽消息晦朔弦望潮汐應焉由朔至望明生而為息自望及晦魄見而為消水隂物也而生于陽潮汐依日而滋長隨月而漸移日起於朔月盈於望一朔一望天西運一周有竒月東行迎日之所次月合於地下之中則日之所次也故潮平於地下之中而會於月潮於寅則汐於申潮於已則汐於亥兩辰而盈兩辰而縮日百刻刻為三分時得八刻三分刻之一周天三百六十五度四分度之一分十二次次得三十度八十分度之三十五日行一度月行十三度有竒漸逺於日故潮汐之期寖移日後六刻三分刻之一一朝夕而再至故一晦朔而再周朔後三日明生而潮壯望後三日魄見而汐湧每嵗仲春月落水生而汐微仲秋月明水落而潮倍減於大寒極隂而凝弱於大暑畏陽而縮隂陽消長不失其時故曰潮信或問燕肅曰四海潮皆有漸惟浙江濤至則常如山嶽奮若雷霆奔激可畏何也答曰龕赭二山謂之海門岸狹勢逼湧而為濤耳若言狹逼則東溟自定海吞餘姚奉化二江侔之浙江尤甚狹逼潮來不聞有聲今浙江之口起自纂風北望嘉興大山水濶二百餘里海舶怖於上灘故取餘姚易舟而浮運河以達杭越蓋以南北岸下夾以沙灘隔礙洪波蹙遏潮勢夫月離震兊他潮已生惟浙江水未洎月徑巽乾潮來已半觸浪推滯後水益來於是溢於沙灘猛怒頓湧聲勢激射故起而為濤耳非山川淺狹使之然也右論潮汐之消長愚按先儒有言天包水水承地而一元之氣升降於太空之中地乘水力以自持與元氣相為升降氣升地沉則水溢而為潮氣降地浮則水縮而為汐計日十二辰由子至巳其氣為陽而陽之氣又自有升降以運乎晝由午至亥其氣為隂而隂之氣又自有升降以運乎夜一晝一夜合天地之氣凡再升再降故一日之間潮汐皆再焉當卯酉之月則隂陽之交也氣以交而盛故潮之大也獨異於他月當朔望之後則天地之變也氣以變而盛故潮之大也獨異於他日其説見於臨安志甚詳今剟其大旨著於此理學類編卷四
