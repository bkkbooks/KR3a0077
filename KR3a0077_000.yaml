body:
  text: 理學類編儒家類提要臣等謹案理學類編八卷明張九韶撰九韶字美和後以字行故明史附見宋訥傳作張美和清江人元末纍舉不仕洪武三年以薦為縣學教諭遷國子監助教改翰林編修致仕歸後復徵入校書書成遣還兹編成於至正丙午乃未入明時所作其初本名格物編臨川吳當見之以為所輯天地鬼神人物性命之説乃格物之一端不足以盡格物之意因為易今名凡天地一卷天文二卷地理一卷人物一卷性命一卷異端一卷以周程張邵朱六子之言為主而以荀子以下五十三家之説輔之復於每篇之末繹以己見其所採擷大都摘取精要不事博引繁稱故條理次序頗為精蜜前代如揚雄谷永淮南子之説近世如洪邁容齋五筆羅大經鶴林玉露之説並加托集以恭觀互證亦不蹈講學家門户之見其異端一門於隂陽相術讖緯諸家斥駁明切尤足以破世俗之惑史載明初司國子監者有宋訥王嘉會龔斆而九韶與聶鈜貝瓊亦皆名儒當洪武時先後為博士助教學録以故諸生多所成就知其躬行導率無忝師範與徒為髙論者異矣乾隆四十二年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書子部一理學類編目録儒家類卷一天地論天地之始終論天地之形體論天之樞紐卷二天文論日月星辰論日月食卷三天文論雲雷風雨之屬論虹霓河漢卷四地理論地里之廣濶論潮汐之消長卷五鬼神論鬼神之情狀論祭祀之感通卷六人物論人物之始生論人為物之靈論輪回生死之辨卷七性命論性命之理論本然之性論氣質之性論心為性情之主卷八異端論佛老神仙論隂陽家之説論相人形貌論讖緯之説理學類編原序古之學者即事以窮理謹乎彛倫日用以修身不敢騖乎髙逺也故曰道不逺人性也者人所得乎天以為德具于人心宜至切矣孔門穎敏莫先子貢而其言曰性與天道不可得而聞則聖人之設教可知矣道絶于戰國經燔于秦漢儒專門授受惟事口耳千有餘年聖賢不傳之緒中興於濂洛關閩諸君子師友並起論議精到道學之明於斯為盛朱子所定諸經四書既有成説而元之設科取士表而宗之宜後學之有依賴而無所惑矣間嘗觀有司取性命天道設為疑問而答者之抵牾不可勝説何哉徒徵諸儒先之言而無以驗乎身心之實稍以己意增廣演繹則舛訛隨焉於是子貢之言為益信而每深嘆其未易聞也臨江張氏九韶采周程以下數子所論天地鬼神人物性命之説載於成書及其門人之所録者輯為八卷名曰理學類編使學者不待遍閲諸家之書而可考乎天道性命之説其用心仁矣哉烏乎知性則知天矣反求諸身盡乎吾心之量則天地之故鬼神之迹事物之雜奚待考索推測而後知哉周子首繼前聖之絶學作為圖説發明太極以授程子而二程終身未嘗以示學者非不欲門人有聞乎天道之妙也以初學之賢而欲窺見天與聖人之道毫釐之差則或淪於髙虛而不知切己之實病則程子之教深有望於後世學者之深造自得之也是編所輯固有功於初學矣然學者不知驗夫身心之實以求聖賢之所同則古昔之言又烏能究其孰同而孰異哉故朱子謂格物致知之學與世之博物洽聞者異此以反身窮理為主而必究其本末是非之極至彼以徇外夸多為務而不核其表裏真妄之實然此為己為人之所以分不可不察也當以庸下之質蓋嘗用力而恆懼未有聞也因誦是編謹述此為序而請教焉臨川吳當序
