body:
  text: 理學類編卷七明張九韶撰性命中庸曰天命之謂性朱子曰命猶令也性即理也天以隂陽五形化生萬物氣以成形而理亦賦焉猶命令也於是人物之生因各得其所賦之理以為健順五常之德所謂性也又曰天命之謂性言天之所以命乎人者是則人之所以為性也蓋天之所以賦豫萬物而不能自已者命也吾之得乎是命以生而莫非全體者性也故以命言之則曰元亨利貞而四時五行庶類萬物莫不由是而出以性言之則曰仁義禮智而四端五典萬事萬物之理無不統於其間蓋在天在人雖有性命之分而其理則未嘗不一在人在物雖有氣稟之異而其理則未嘗不同此吾之性所以純粹至善而非若荀揚韓子之云也又曰天命之謂性命便是誥敕之類性便是合當做底職事如主簿銷注縣尉巡捕心便是官人氣質便是官人所習尚或寬或猛情便是當㕔處斷事如縣尉捉得賊情便是發處性只是仁義禮智程子曰天所賦為命物所受為性朱子曰命猶誥敕性猶職任天以此理命於人人稟受此理則謂之性又曰天之生此人如朝廷之命此官人之有此性如官之有此職邵子曰天使我有是之謂命命之在我之謂性性之在物之謂理朱子曰理一也自天所賦豫萬物言之謂之命以人物所稟受於天言之謂之性朱子曰天生蒸民有物有則只生此民時便已是命他以此性了性即是理以其在人所稟故謂之性嘗譬之命字如朝廷差除性字如官守職業故伊川言天所賦為命物所受為性其理甚明故凡古聖賢說性命皆是就實事上說如言盡性便是盡得此三綱五常之道而無餘言養性便是養得此性而不害至微之理至著之事一以貫之略無餘矣非虛語也問天與命性與理四者之别天則就其理之自然言之命則就其流行而賦於物者言之性則就其全體而萬物所得以生者言之理則就事事物物各有其則者言之合而言之天即理也命即性也性即理也是如此否朱子曰然右論性命之理愚按北溪陳氏有言性命只是一箇道理不分看則不分曉只管分看不合看又離了不相干涉須是就渾然一理中看得有界限不相亂所以謂之命謂之性者何故大底性只是理然人之生不成只空得箇理須有箇形骸方載得此理其實理不外乎氣得天地之氣成這形得天地之理成這性所以張子曰天地之塞吾其體天地之帥吾其性孟子道性善言必稱堯舜朱子曰性者人所稟於天以生之理也渾然至善未嘗有惡人與堯舜初無少異但衆人汨於私欲而失之堯舜則無私欲之蔽而能充其性耳公都子曰告子曰性無善無不善也或曰性可以為善可以為不善或曰有性善有性不善今曰性善然則彼皆非與孟子曰乃若其情則可以為善矣乃所謂善也若夫為不善非才之罪也朱子曰情者性之動也人之情本但可以為善而不可以為惡則性之本善可知矣才猶材質人之能也人有是性則有是才性既善則才亦善人之為不善乃物欲陷溺而然非其才之罪也或問情與才皆善如何曰情本自善其發也未有㸃注何嘗不善才只是資質亦無不善譬物之未染只是白也又曰孟子所謂性善者以其本體言之仁義禮智之未發者是也所謂可以為善者以其用處言之四端之情發而中節者是也蓋性之與情雖有未發已發之不同然其所謂善者則血脉貫通初未嘗有不同者此孟子道性善之本意伊洛諸君子之所𫝊而未之有改者也真氏曰善者性也而能為善者才也性以體言才以用言饒氏曰孟子是指那好底才說如仁之能愛其親義之能敬其兄所謂良能是也程子曰性即理也天下之理原其所自未有不善喜怒哀樂未發何嘗不善發而中節則無往而不善發不中節然後為不善故凡言善惡皆先善而後惡言吉凶皆先吉而後凶言是非皆先是而後非朱子曰性即理也一語自孔子後無人見得到此伊川此語直是攧撲不破性即是天理那得有惡又曰理是天地間公共之理人稟得便為性所有張子曰性者萬物之一原非有我之得私也惟大人為能盡其道朱子曰所謂性者人物之所同得非惟已有是人亦有是非惟人有是物亦有是朱子曰性本善故順之而無不善本無惡故反之而後為惡非本無定體而可以無所不為也北溪陳氏曰性即理也何以不謂之理而謂之性蓋理是泛言天地間人物公共之理性是在我之理只這道理受於天而為我所有故謂之性性字從心從生是人生來具是理於心方名之曰性其大目只是仁義禮智四者而已得天命之元在我謂之仁得天命之亨在我謂之禮得天命之利在我謂之義得天命之貞在我謂之智性與命本非二物在天謂之命在人謂之性右論本然之性愚按本然之性天地之性也天地之性有善而無惡故孟子言性必道性善而先儒以為發聖賢之所未及者也子曰性相近也習相逺也程子曰此言氣質之性非言性之本也若言其本則性即是理理無不善孟子之言性善是也何相近之有哉朱子曰此所謂性兼氣質而言也氣質之性固有美惡之不同矣然以其初而言則皆不甚相逺也但習於善則善習於惡則惡於是始相逺耳程子曰生之謂性性即氣氣即性生之謂也人生氣稟理有善惡然不是性中元有此兩物相對而生也有自幼而善有自幼而惡是氣稟有然也善固性也然惡亦不可不謂之性也蓋生之謂性人生而靜以上不容說才說性時便已不是性也凡人說性只是說繼之者善也孟子言性善是也夫所謂繼之者善也者猶水流而就下也皆水也有流而至海終無所汙此何煩人力之為也有出而未逺固己漸濁有出而甚逺方有所濁有濁之多者有濁之少者清濁雖不同然不可以濁者不為水也如此則人不可以不加澄治之功故用力敏勇則疾清用力緩怠則遲清及其清也則却只是元初水也不是將清來換却濁亦不是取出濁來置在一隅也水之清則性善之謂也故不是善惡在性中為兩物相對出來朱子曰程子說人生而靜以上是人物未生時只可謂之理未可名為性所謂在天曰命也才說性時便是人生以後此理已墮在形氣之中不全是性之本體矣所謂在人曰性也黃氏曰所譬水處尋常作兩截看猶水流而就下一句以就下譬性之善孟子所謂人無有不善水無有不下者也此結上文人生而靜以上不容說以下一段之意皆水也又是發端别說人生氣稟不同而性亦隨異故有此五者之分有無所汙者氣之清明純粹者也有未逺而漸濁有已逺而方濁有濁多有濁少觀其文勢皆以有字冠其上則可見矣真氏曰黃氏氣稟不同性亦隨異之云最得此段之意蓋人之氣稟有至善而不可移奪者有善少惡多而易於移奪者有善多惡少而難於移奪者又曰性之不能離乎氣猶水之不能離乎土也性雖不雜乎氣而氣汨之則不能不惡矣水雖不雜乎土而土汨之則不能不濁矣然清者其先而濁者其後也善者其先而惡者其後也先善者本然之性也後惡者形而後有也故所謂善者超然於降衷之初而所謂惡者雜出於有形之後其非相對而並出也昭昭矣程子曰論性不論氣不備論氣不論性不明二之則不是朱子曰天命之性若無氣質却無安頓處且如一勺之水非有物盛之則水無歸者程子此論所以發明千古聖賢未盡之意甚為有功又曰論性不論氣無以見生質之異論氣不論性無以見義理之同葉氏曰論性之善而不推其氣稟之不同則何以有上智下愚之不移故曰不備論氣質之異而不原其性之皆善則是不達其本也故曰不明然性氣二者元不相離判而二之則亦非矣程子曰性即理也理則堯舜至於塗人一也才稟於氣氣有清濁稟其清者為賢稟其濁者為愚學而知之則氣無清濁皆可至於善而復性之本湯武身之是也朱子曰程子此說才字與孟子本文小異蓋孟子専指其發於性者言之故以為才無不善程子兼指其稟於氣者言之則人之才固有昏明强弱之不同矣張子所謂氣質之性是也二說雖殊各有所當然以事理考之程子為密蓋氣質所稟固有不善而不害性之本善性雖本善而不可無省察矯揉之功學者所當深省也程子曰性出於天才出於氣氣清則才清氣濁則才濁才則有善有不善性則無不善朱子曰性與氣皆出於天性即是理氣則已屬於形象性善人所同氣便有不齊處葉氏曰性本乎理理無不善才本乎氣氣則不齊故或以之為善或以之為惡張子曰形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉朱子曰氣質之說起於張程極有功於聖門有補於後學前此未曽有人說到又曰天地之性専指理而言氣質之性以理雜氣而言又曰性譬之水本皆清也以淨器盛之則清以汚器盛之則濁澄治之則本然之清未嘗不在張子曰性於人無不善繫於善反與不善反而已過天地之化不善反者也或問氣質之性朱子曰天地之所以生物者理也其生物者氣與質也人物得是氣質以成形而其理之在是者則謂之性然所謂氣質者有偏正純駁昏明厚薄之不齊故性之在是者其為品亦不一所謂氣質之性者告子所謂生之謂性程子所謂生質之性所稟之性所謂才者皆謂是也然其本然之理則純粹至善而已所謂天地之性者也孟子所謂性善程子所謂性之本所謂極本窮原之性皆謂此也問惡是氣稟程子云亦不可不謂之性何也朱子曰既是氣稟惡便牽引那性不好蓋性只是搭付在氣稟上乂曰性本善今乃惡亦是此性為氣所汨正如水為泥沙所混不成不喚作水朱子曰性是天賦與人只一同氣質所稟却有厚薄人只是一般人厚於仁而薄於義有餘於禮而不足於智便是氣質上來黃氏曰氣有偏正則所受之理隨而偏正氣有昏明則所受之理隨而昏明木之氣盛則金之氣衰故仁常多而義常少金之氣盛則木之氣衰故義常多而仁常少若此者氣質之性有善不善也南軒張氏曰原性之理無有不善人物所同也論性之存氣質則人稟天地之精五行之秀固與禽獸草木異然就人之中不無清濁厚薄之殊而實未嘗不相近也雙峰饒氏曰朱子嘗與勉齊言喜怒哀樂未發之時氣不用事蓋此時惡自沈在下面善之本體呈露少焉接物便打動了性譬之水方其澄靜之時清底在上濁底在下少間流出清底先出來流來流去濁底亦隨後出但聖人純是清底聖人以下則有清多底有濁多底清多者便是氣質之美右論氣質之性愚按氣質之性亦自天地之性而出但屬乎氣稟則有善不善之殊故先儒謂本然之性與氣質之性亦非判然兩物是也程子曰心也性也天也一理也自理而言謂之天自稟受而言謂之性自存諸人而言謂之心問心有善惡否程子曰在天為命在物為理在人為性主於身為心其實一也心本善發於思慮則有善不善若既發則可謂之情不可謂之心譬之水只可謂之水至於流而為派或行於東或行於西却謂之流也朱子曰性無不善心之所發為情却或有不善說不善非心亦不得却只是心之本體無不善其流而為不善者皆情之感於物而然也邵子曰性者道之形體心者性之郛郭身者心之區宇物者身之舟車朱子曰邵子所說較之橫渠心統性情尤密真不易之論問性如何是道之形體曰道是凡言性是就自家身子說道在事物之間如何見得只就這裏驗之性之所在則道之所在也道是在物之理性是在己之理然物之理都在我此性之中又曰理之在心即所謂性故曰心者性之郛郭北溪陳氏曰心只是箇器一般裏面貯底物便是性康節謂心者性之郛郭蓋郛郭者心也郛郭中許多人煙便是心中所具之理相似所具之理便是性張子曰心統性情者也朱子曰統是主宰性者心之理情者心之用心者性情之主又曰統如統兵之統言有以主之也張子曰由太虛有天之名由氣化有道之名合虛與氣有性之名合性與知覺有心之名朱子曰上二句是總說下二句就人上說四句本只是一箇太虛漸細分說得密耳且太虛便是這四者之總體而不雜乎四者之言氣化者那隂陽造化金木水火土皆是太虛便是太極圖上面一圓圈氣化便是隂靜陽動合虛與氣有性之名有這氣道理便隨在這裏若無此氣則道理無安頓處如水中月須是有此水方印得天上月影心之知覺又是那氣之虛處聰明視聽作為運用皆是知覺定宇陳氏曰天者理而已惟以理言則幾於泛以形體謂之天惟以形體言則涉於淺今曰太虛則虛空之中有太極之理此由太虛所以有天之名也一隂一陽之謂道所以一隂而又一陽一陽而又一隂者氣之化也化云者所以然之妙也此由氣化所以有道之名也合太虛之虛與氣化之氣理寓於氣而具於人之性此合虛與氣所以有性之名也性理也知覺所以知覺此理也偏言知覺惟見氣之靈耳必合性與知覺言之所以有心之名也北溪陳氏曰虛是以理言理與氣合遂生人物受得去成這性於是乎方有性之名性從理來不離氣知覺從氣來不離理合性與知覺於是乎方有心之名五峰胡氏曰誠成天下之性性立天下之有情效天下之動心妙性情之德朱子曰五峰此說不是曽去研窮深體如何直見得恁地真氏曰誠者真實無妄之理天之命於人人之受於天惟此而己故曰誠成天下之性凡天下所有之理莫不具于一性之中故曰性立天下之有情者性之動也效如爻者效也之效天下之理不能無變動卦之有爻所以像之性之有情亦猶是也未發則理具于性既發則理著於情情之動雖因乎物所以不能無動則理也故曰情效天下之動仁義禮智性之德惻懚羞惡辭讓是非情之德性情之德雖具而發揮運用則在此心而已故中庸論大本達道必以戒懼謹獨為主蓋該寂感貫動靜者心也心得其正然後性之本然者全而情之發亦中節矣故曰心妙性情之德朱子曰心者人之神明所以具衆理而應萬事者也性則心所具之理而天又理之所從以出者也朱子曰性猶太極也心猶隂陽也太極只在隂陽之中非能離隂陽也然至論太極則太極自太極隂陽自隂陽性與心亦然所謂一而二二而一者也氣之流行性為之主性之流行心為之主朱子曰捨心則無以見性捨性又無以見心故孟子言心性每每相隨性是心所有之理心是理所會之地朱子曰性只是理情是流出運用處心之知覺即所以具此理而行此情者也朱子曰心譬水也性水之理也性則水之靜情者水之動欲則水之流而至於泛濫者也才則水之氣力所以能流者其流有急有緩則是才之不同朱子曰有是形則有是心而心之所得乎天之理則謂之性性之所感於物而動則謂之情朱子曰性情字皆從心古制字必是有意問心性之别朱子曰靈底是心實底是性性是理心便是盛貯這理底心屬火緣他是箇光明發動底物所以具得許多道理如向父母則有那孝出來向君則有那忠出來這便是性如知道事親要孝事君要忠這便是心或問心性之别朱子曰這箇極難說且是難為譬喻如伊川以水喻性其說本好却使曉不得者生病心大概似箇官人天命即是君之命性便如執事一般此亦大概如此要自理㑹得如邵子云性者道之形體蓋道只是合當如此性則有箇根苗生出君臣之義父子之仁性雖虛都是實理心雖是一物却虛故能包含萬理這要人自體察始得朱子曰在天為命稟於人為性既發為情此其脉理甚實仍便分明易曉惟心乃虛明洞徹統性情而為言耳據性上說寂然不動處是心亦得據情上說感而遂通處是心亦得朱子曰人之一身知覺運用莫非心之所為則心者固所以主於身而無動靜語默之間者也然方其靜也事物未至思慮未萌而一性渾然道義全具其所謂中是乃心之所以為體而寂然不動者也及其動也事物交至思慮萌焉則七情迭用各有攸主其所謂和是乃心之所以為用感而遂通者也然性之靜也而不能不動情之動也而必有節焉是則心之所以寂然感通周流貫徹而體用未始相離者也然人有是心而或不仁則無以著此心之妙人雖欲仁而或不敬則無以致求仁之功蓋心主乎一身而無動靜語默之間是以君子之於敬亦無動靜語默而不用其力焉未發之際是敬也固以主乎存養之實已發之際是敬也又常行於省察之間方其存也思慮未萌而知覺不昧是則靜中之動復之所以見天地之心也及其察也事物紛糾而品節不差是則動中之靜艮之所以不獲其身不見其人也有以主乎靜中之動是亦寂而未嘗不感有以察乎動中之靜是亦感而未嘗不寂寂而遂感感而常寂此心之所以周流貫徹而無一息之不仁也右論心為性情之主愚按論心為性之主則涵養此性使仁義禮智常存於中是心統性也論心為情之主則節制此情使喜怒哀樂發而中節是心統情也故先儒嘗謂心猶將也性猶在營之軍情猶臨陳之軍皆將實統之則心為性情之主可見矣理學類編卷七
