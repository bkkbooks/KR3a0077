body:
  text: 理學類編卷六明張九韶撰人物易繫辭曰天地絪緼萬物化醇男女搆精萬物化生朱子曰絪緼交密之狀醇謂厚而凝也言氣化者也化生形化者也魯齊鮑氏曰天地是劈初隂陽之氣結成立其大者以為之主便是箇坯墣子然後為父為母生人生物千變萬化皆不出此所以充塞宇宙何莫非隂陽之氣也禮記曰故人者天地之德隂陽之交鬼神之㑹五行之秀氣也朱子曰天地之德理也隂陽之交鬼神之㑹氣也交者其氣之妙合㑹者其氣之凝聚而成形者也真氏曰天地之德指乾坤健順而言此天地之理人之所得以為性者也隂陽鬼神五行皆指氣而言流行天地之間而人之所得以為形者也然氣之流行理實寓焉非氣之外有所謂理也但理無不善氣則有清濁昏明之不同耳北溪陳氏曰禮運言人者隂陽之交鬼神之㑹說得亦親切此真聖賢之遺言非漢儒所能道也蓋人受隂陽二氣而生此身莫非隂陽如氣陽而血隂脉陽而體隂頭陽而足隂上體為陽下體為隂至於口之語默目之寤寐鼻息之呼吸手足之屈伸皆是隂陽分屬不特人如此凡萬物皆然周子曰無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉朱子曰真以理言精以氣言妙合者太極二五本混融而無間也凝者聚也氣聚而成形也蓋性為之主而隂陽五行為之經緯錯綜又各以類凝聚而成形焉陽而健者成男則父之道也隂而順者成女則母之道也是人物之始以氣化而生者也氣聚成形則形交氣感遂以形化而人物生生變化無窮矣又曰無極是理二五是氣無極之理便是性性為之主而二氣五行經緯錯綜於其間也凝只是此氣結聚自然生物若不如此結聚亦何由造化得萬物出來程子曰萬物之始氣化而已既形氣相禪則形化長而氣化消朱子曰氣化是當初一箇人無種後自生出來底形化却是有此一箇人後乃生生不窮底程子曰隂陽之運升降盈縮未嘗少息陽常盈隂常虧一參差不齊而萬變生焉譬如磨既行齒都不齊既不齊便生出萬變朱子曰太極分開只是兩箇隂陽都括盡天下事物千變萬化只是他兩箇隂氣流行則為陽陽氣流行則為隂只這一氣消長進退做出古今天地間無限事出來程子曰天地儲精得五行之秀者為人朱子曰得五行之秀者為人只說五行而不說隂陽者蓋做這人須要五行方做得成然隂陽便在五行中如甲乙木甲便是陽乙便是隂丙丁火丙便是陽丁便是隂不須更說隂陽而隂陽在其中矣程子曰隕石無種種於氣麒麟無種亦氣化厥初生民亦如是至如海濵露出沙灘便有百蟲禽獸草木無種而生此猶是人所見若海中島嶼稍大人不到者安知其無種之人不生於其間若已有人類則必無氣化之人又問人初生時還以氣化否曰此必燭理當徐論之且如海上忽露出沙島便有草木生有土而生草木不足怪既有草木自然禽獸生焉曰今天下未有無父母之人古有氣化今無氣化何也曰有兩般有全是氣化而生者若腐草化為螢是也既是氣化到合化時自化有氣化生之後而種生者且如人身上著新衣服過幾日便有蟣蝨生其間此氣化也氣既化後更不化便以種生去此理甚明張子曰天地之始固未嘗先有人也則人固有化而生者矣蓋天地之氣生之也朱子曰天地之初如何討箇種自是氣蒸結成兩箇人後方生許多物事所以先說乾道成男坤道成女後方說化生萬物當初若無那兩箇人如今如何有許多人那兩箇人便似而今人身上蝨自然變化出來張子曰遊氣紛擾合而成質者生人物之萬殊隂陽兩端循環不已者立天地之大義或問橫渠此言是言二氣混沌之初天地未判之時為復是亘古亘今如此朱子曰只是統說只今便如此又曰晝夜運而無息者便是隂陽兩端其四邊散出紛擾者便是遊氣以生人物之萬殊此正如麵磨相似其四邊只管層層撒出天地之氣運轉無已只管層層撒出人物其中有粗有細故人物有偏有正有精有粗又曰隂陽循環如磨遊氣紛擾如磨中出者易曰剛柔相磨八卦相蕩此隂陽之循環也乾道成男坤道成女此遊氣之紛擾也鮑氏曰一元之氣略無停間只是生出許多物天地只是包得許多氣在裏無出處衮一畨便生一畨物造化之運如磨其生物似磨中撒出來有精有粗只是不齊張子曰乾稱父坤稱母豫兹藐焉乃混然中處故天地之塞吾其體天地之帥吾其性民吾同胞物吾與也朱子曰天陽也以至健而位乎上父道也地隂也以至順而位乎下母道也人稟氣於天賦形於地以藐然之身混合無間而位乎中子道也然不曰天地而曰乾坤者天地其形體也乾坤其性情也乾者健而無息之謂萬物之所以資始也坤者順而有常之謂萬物之所資以生者也是乃天地之所以為天地而父母乎萬物者故指而言之人物並生於天地間其所資以為體者皆天地之氣塞乎兩間者也其所得以為性者皆天地之志為氣之帥者也然體有偏正之殊故其於性也不無明暗之異惟人也得其形氣之正是以其心之最靈而有以通乎性命之全體於並生之中又為同類而最貴焉故曰同胞則其視之也皆如己之兄弟矣物則得夫形氣之偏而不能通乎性命之全故與我不同類而不若人之貴然原其體性之所自是亦本之天地而未嘗不同也故曰吾與則其視之也亦如己之儕輩矣北溪陳氏曰塞字是就孟子浩然之氣塞乎天地句掇一字來說氣帥字是就孟子志氣之帥也句掇一字來說理朱子曰天道流行發育萬物其所以為造化者隂陽五行而已而所謂隂陽五行者又必有是理而後有是氣及其生物則又必因是氣之聚而後有是形故人物之生必得是理然後有以為健順仁義禮智之性必得是氣然後有以為魂魄五藏百骸之身周子所謂無極之真二五之精妙合而凝者正謂此也然以其理而言之則萬物一原固無人物貴賤之殊以其氣而言之則得其正且通者為人得其偏且塞者為物是以或貴或賤而不能齊也或問太極圖下二圈固是乾道成男坤道成女各有一太極也若曰乾道成男坤道成女方始萬物化生易中却云有天地然後有萬物有萬物然後有男女如何朱子曰太極圖所說乃生物之初隂陽之精自凝結成兩箇後來方漸漸生去萬物皆然如牛羊草木皆有牝牡一為陽一為隂萬物有生之初亦各自有兩箇故曰二五之精妙合而凝朱子曰乾道成男坤道成女凝體於造化之初二氣交感化生萬物流形於造化之後者理之常也若姜嫄簡狄之生稷契則又不可以先後言矣此理之變也魯齊鮑氏曰天地之氣交而生人物觀其所交則氣之所至可以知其類之所從出矣天氣交乎地於人為男於物為牡地氣交乎天於人為女於物為牝男女牝牡又自交而生生化化之類不窮人物既生氣隨天地之氣升降交感人得天地之中氣四方之氣無不感物得天地之偏氣而亦各隨所感故觀天地之氣交可以知人物之初生矣觀天地之氣感可以知人物之相生矣問人之生也精氣凝時此理便在氣上否朱子曰天道流行發育萬物雖是一齊都有必竟是理為主然氣有清濁清者為氣濁者為質清者屬陽濁者屬隂知覺運動陽之為也骨肉毛血隂之為也勉齊黃氏曰水火之氣一濕一燥水濕氣而生木火燥極而生金人物始生亦精與氣聚而為之耳精濕而氣燥精沉而氣浮故精為貌而氣為言精之盛者濕之極故為木為肝為視氣之盛者燥之極故為金為肺為聽大抵貌與視屬精故精衰而目暗言與聽屬氣故氣塞而耳聾朱子曰天之生此人無不與之以仁義禮智之性亦何嘗有不善但欲生此物必須有氣然後此物有以聚而成質而氣之為物有清明昏濁之異稟其清明之氣而無物欲之纍則為聖稟其清明之氣而未能純全未免微有物欲之纍而能克以正之則為賢稟其昏濁之氣又為物欲之所蔽而不能去則為愚不肖是皆氣稟物欲之所為而性之善未嘗不同也朱子曰有是理而後有是氣有是氣必有是理但稟氣之清者為聖為賢此如寶珠在清泠水中稟氣之濁者為愚不肖此如寶珠在濁水中所謂明明德者是就濁水中揩拭此珠也物亦有是理又如寶珠在至汚處然其所稟有些明處就上面便自不昧如虎狼之父子蜂蟻之君臣是也朱子曰人得其氣之正故是理通而無所塞物得其氣之偏故是理塞而無所通且如人頭圓象天足方象地平正端直以其受天地之正氣所以識道理有知識物受天地之偏氣所以禽獸橫生草木頭本向下尾反向上物之有知者不過通得一路如烏之知孝獺之知祭犬之能守禦牛能耕而已人則無不知無不能人所以與物異所爭者此耳朱子曰論萬物之一原則理同而氣異觀萬物之異體則氣猶相近而理絶不同氣相近如知寒暖識饑飽好生惡死趨利避害人與物都一般理不同如蜂蟻之君臣只是義上有一㸃子明虎狼之父子只是仁上有一㸃子明其他更推不去問人稟天地五行之氣然父母所生與是氣相值而然否朱子曰便是這氣須從人身上過來今以五行枝幹推算人命與夫地理家推擇山林向背皆是此理然又有異處如磁窑中器物聞說千百件中或有一件紅色大段好者此是異稟惟人亦然瞽鯀之生舜禹亦猶是也問人物皆稟天地之理以為性皆受天地之氣以為形若人稟之不同固是氣有昏明厚薄之異若在物言之不知是所稟之理便有不全邪亦是緣氣稟之昏蔽有不同邪朱子曰惟其所受之氣只有許多故其理亦只有許多如犬馬形氣如此故只㑹得如此事又問物物具一太極則是理無不全也曰以理言之則無不全以氣言之則不能無偏問虎狼之父子蜂蟻之君臣豺獺之報本雎鴈之有别物雖得其一偏然徹頭徹尾得義理之正人合下具此天命之全體乃為物欲氣稟所昏反不能如物之能通其一處而全盡何也朱子曰只有這一路通便却専人却事事理㑹得些便却泛泛所以易昏問鳥獸亦有知覺但他知覺有通塞草木亦有知覺否朱子曰亦有如一盆花得些水澆灌便敷榮若摧折他便枯悴謂之無知覺可乎周茂叔忩前草不除又與自家意思一般便是有知覺只是鳥獸底知覺不如人底草木底知覺又不如鳥獸底朱子曰草木都是得隂氣走飛都是得陽氣各分之草是得隂氣故草弱木是得陽氣故木堅走獸是得隂氣飛鳥是得陽氣故獸伏草而鳥棲木然獸又有得陽氣者如猿猴之類是也鳥又有得隂氣者如雉鴿之類是也雖草木都是得隂氣然却有隂中陽陽中隂者問動物有知植物無知何也朱子曰動物有血氣故能知植物雖不可言知然一般生意亦可見若戕賊之便枯悴不悅懌亦似有知者朱子曰冬間花難謝如水仙至脆弱亦耐久如梅花蠟梅皆然至春花則易謝若夏間花則尤甚矣如葵㨨荷花只開得一兩日必竟冬時其氣貞固故難得謝若春夏間才發便發盡了故不能久又云大凡花頭大者易謝果實亦然如梨樹極易得衰謝將死時須猛結一年實了便死此亦得氣將脫也朱子曰古者伏羲觀鳥獸之文與地之宜想聖人心細雖鳥獸羽毛之微也盡察得有隂陽今人心粗如何察得因言凡草木禽獸無不有隂陽鯉魚背上有三十六鱗隂數也龍脊上有八十一鱗陽數也龜背上文中間五段者五行也兩邊各有四段者八卦也周圍二十四段者二十四氣也箇箇如此又如草木之有雌雄銀花桐楮牝牡麻竹之類皆然又樹木向陽處則堅實背隂處必虛軟男生必伏女生必偃蓋男陽氣在背女陽氣在腹故也程子因見賣者曰聖人見河圖洛書而畫八卦然何必圖書只有此亦可作八卦數便在中可起古之聖人只取神物之至著者耳只如樹木亦可見數何以無尾只為是隂物大抵陽物尾長陽盛者尾尤長如雉是盛陽之物故尾極長又其身文明今之行軍者多植雉尾車上以候雨晴天將雨則先垂向下才晴便直上程子曰動植之分有得天氣多者有得地氣多者本乎天者親上本乎地者親下然要之木植亦兼有五行之性在其中只是偏得土之氣故重濁也朱子曰本乎天者親上凡動物首向上是親乎上人類是也本乎地者親下凡植物首向下是親乎下草木是也禽獸首多橫生所以無智此本康節說程子曰近取諸身一身之內百理具備背在上故為陽胸在下故為隂至如男女之生已有此象天有五行人有五藏心火也著些天地間熱氣乘之則便須發燥肝木也著些天地間風氣乘之則便須發怒推之五藏皆然孟子將四端便為四體仁便是箇木氣象惻隱之心便是箇生物春底氣象羞惡之心便是箇秋底氣象推之四端皆然此箇道理雖牛馬血氣之類亦然都恁具備只是流行不同各隨形氣後便昏了他氣如子愛其母母愛其子亦有木底氣象又人皆有羞惡之心如避害就利别所愛惡一一理完更如獼猴尤似人故於獸中最為智巧童昏之人見解不及者多矣然而惟人氣最清可以輔相裁成立乎天地之間所以為三才問理是人物同得於天者如物之無情者亦有理否朱子曰固有是理如舟只可行之於水車只可行之於陸北溪陳氏曰人物之生不出乎隂陽五行之氣本只是一氣分來有隂陽隂陽又分來為五行二與五則管分合運行便有參差不齊有清有濁有厚有薄且以人物合論同是一氣但人得氣之正物得氣之偏人得氣之通物得氣之塞且如人形骸却與天地相應頭圓居上象天足方居下象地北極為天中央却在北故人百會穴在頂心却向後日月往來只在天之南故人之兩眼皆在前海鹹水所歸在南之下故人之小便亦在前下此所以為得氣之正物則禽獸頭橫植物頭向下枝葉却在上此皆得氣之偏處人氣通明物氣壅塞人得五行之秀故為萬物之靈物氣塞而不通所以義理皆不通魯齊鮑氏曰人頭圓頂天足方履地面南背北左東右西耳聰目明手舉足履無不通正君臣父子五典之倫仁義禮智五常之性根於心而著於外得其氣之清者為聖為賢得其氣之濁者為愚為不肖至於近東者多仁而柔近西者多義而剛亦氣稟之異不得不然夷狄亦人類悍暴無禮義者以其得地偏故稟氣亦偏氣使然也非性也人直生禽獸橫生草木倒生橫生者得氣尤偏故首西向背天足地於其偏之中亦有仁義存焉得東者仁得西者義所以當卯酉之位禽雖橫而首昻與獸微異亦得東方之氣者仁得西方之氣者義鱗甲毛蜾之類又氣之漸入於地者也倒生者得入地之氣得西北者剛得東南者柔天下之類盡之矣龍得正東虎得正西故東有蒼龍西有白虎說文麒麟東方仁獸騶虞西方仁獸凡得東氣皆角得西氣皆齒角者常仁其不及者亦柔而易馴如牛羊之類是也其太過者必剛而多賊如豺狼犬豕之類是也西方獸皆宵行東方獸宵多暝惟龍不麗此數神故也禽橫而首昻以氣離地以上漸近乎天故首昻而能飛然東南者自下而升首短尾長羽多文其將飛必騰而上西北者自上而降首長尾短羽多𤣥縞其將飛必墜于下亦有仁義存焉升之小者為雞雉飛不離地大者為鸞鳳飛冲天降之小者為鴿為鶴飛近天極為鳬鴨飛搶地至於入水東南夜暝西北夜飛自戌至酉漸入地自寅至卯漸出地故西方為甲蟲蜾蟲常多蟄氣漸入故也東方為鱗蟲羽蟲常多生氣漸出故也故龜黿之類善伏息魚蛇之類善變化隂陽變化升降使然也草得入地之氣故皆倒生與人正相反蓋氣有逆順不容不然生於東者柔秋落春夏榮生於西者剛春落秋冬榮枝葉向隂枝不離地故獸宿之且食其葉木實向陽木參乎天故禽棲之且食其實各從其類也北溪陳氏曰若就人品上論則上天所賦皆一般而人隨其所值又各有清濁厚薄之不齊惟聖人得氣至清賦質至粹如堯舜於清粹之中又得氣之髙厚所以貴為天子富有四海至享國皆百餘嵗是又得氣之最長者如夫子亦得至清至粹然稟得不髙厚止栖栖為一旅人而所得之氣又不甚長止得七十餘嵗自聖人以下各有分數顔子亦清明純粹亞於聖人只緣氣不長所以夭死大抵得氣之清者不隔蔽理義便呈露昭著如銀盞中滿貯清水自透見盞底銀花子甚分明若未嘗有水然賢人得清氣多而濁氣少清中雖有些渣滓未能昏蔽他所以聰明也易開發自大賢以下或清濁相半或清少濁多昏蔽得厚了如盞底銀花子看不見欲見得須十分加澄治之功若能力學也解變化氣質轉昏為明有一般人稟氣清明於義理上儘看得出而行為不篤多般詭譎是又賦質不粹此如井泉甚清貯在銀盞裏面亦透底清徹但泉脉從淤土惡木根中穿過來味不純甘以之煮白米則成赤飯烹茶則酸澀是有惡味夾雜了又有一般人生下來於世味一切簡淡所為甚純正但與說到道理處全發不來是又賦質純粹而稟氣不清此如井泉脉味純甘絶佳而有泥土混濁了終不透瑩又有一般人甚好說道理只是執拗自立一家意見是稟氣清中被一條戾氣來衝拗了如泉出來甚清却被一條别水橫衝破了及遭巉岩石頭橫截衝激不帖順去反成險惡之流看來人生氣稟有多少般樣或相倍蓰或相什百或相千萬不可一律齊畢竟清明純粹恰好底極為難得所以聖賢少而愚不肖者多右論人物之始生愚按論人物始生於天地肇判之初則由氣化而後有形化張子所謂天地之氣生之是也論人物始生於結胎受形之初則由精氣之聚而後有是物朱子所謂隂精陽氣聚而成物是也由是言之則人也物也氣也形也孰有出於隂陽之外哉又按淮南子精神訓言精神者所受於天也而形體者所稟於地也萬物背隂而抱陽冲氣以為和故一月而膏二月而胅三月而胎四月而肌五月而筋六月而骨七月而成八月而動九月而躁十月而生形體以成五藏乃形而醫書之說亦然因附見於此孔子曰天地之性人為貴龜山楊氏曰人稟五行之秀氣而靈於萬物者也故曰天地之性人為貴然人之下愚卒至於同乎物者豈賦豫之異哉失其性而自賊之過也荀子曰水火有氣而無生草木有生而無知禽獸有知而無義人有氣有生有知亦且有義故最為天下之貴也董子曰人受命於天固超然異於羣生入有父子兄弟之親出有君臣上下之誼㑹聚相遇則有耆老長幼之施粲然有文以相接歡然有恩以相愛此人之所以貴也生五穀以食之桑麻以衣之六畜以養之服牛乘馬圈豹檻虎是其得天之靈貴於物也周子曰惟人也得其秀而最靈朱子曰人物之生莫不有太極之道焉然隂陽五行氣質交運而人之所稟獨得其秀故其心為最靈而有以不失其性之全所謂天地之心而人之極也邵子曰飛者食木走者食草人則兼之而又食飛走也故最貴於萬物也朱子曰得天地之中氣為人而四方之氣無不具故人為天地之貴萬物之靈也朱子曰性者人之所得於天之理也生者人之所得於天之氣也性形而上者也氣形而下者也人物之生莫不有是性亦莫不有是氣然以氣言之則知覺運動人與物若不異也以理言之則仁義禮智之稟豈物之所得而全之哉此人之性所以無不善而為萬物之靈也朱子曰天之生物有血氣知覺者禽獸是也無血氣知覺而但有生氣者草木是也生氣已絶而但有形質臭味者枯槁是也是雖其分之殊而其理則未嘗不同也但其分之殊則其理之在是者不能不異故為人最靈備有五常之性禽獸則昏而不能備草木枯槁則并與其知覺者而亡焉但其所以為是物之理則未嘗不具耳右論人為物之靈愚按人與萬物並生於天地之間當知自貴於物知自貴於物則天以是理賦於我而我受之以為性者可不自盡其道哉茍不能盡其道而甘自棄於殄絶之域則是生與禽獸同行死與草木同腐吁可哀也已程子曰近取諸身百理皆具屈伸往來之義只於鼻息之間見之屈伸往來只是理不必將既屈之氣復為方伸之氣生生之理自然不息如復卦言七日來復其間元不斷續陽以復生物極必返其理須如此有生便有死有始便有終朱子曰此段為橫渠形潰反原之說而發按張子嘗曰形聚為物物潰反原反原者其遊魂為變乎故程子辨其非果齊李氏曰屈伸往來者氣也其所以屈伸往來者理也往而屈者其氣已散來而伸者其氣方生生生之理自然不窮若以既屈之氣復為方伸之氣則是天地間只有許多氣來來去去造化之理不幾於窮乎釋氏不明乎此所以有輪回之說程子曰凡物之散其氣遂盡無復歸本原之理天地之化自然生生不窮更何資既返之氣以為造化哉况既返之氣已散豈有復在天地之間造化又焉用此既散之氣其造化者自有生氣至如海水潮因陽盛而涸及隂盛而生亦不是將已涸之水來生水自然能生往來屈伸只是理也張子曰浮圖明鬼謂有識之死受生循環遂厭苦求免可謂知鬼乎惑者指遊魂為變為輪回未之思也今浮圖劇論要歸必論死生流轉非得道不免謂之悟道可乎鮑若雨問輪回之說凡為善者死則復生為善人為惡者死則變為禽獸之類切恐有此理何則凡禀沖氣以生者未始不同聖人先得人之所同者而踐履之故能保合太和至死其氣冥㑹於沖和之氣造化之中自然有復生為人之理惡者平居作惡而沖氣已喪至死其氣則㑹於謬戾之所造化之中自然有為禽獸之理如何程子答曰未知生焉知死知生則知死矣知原始則能要終矣今按程子此言引而不發蓋欲學者深思而自得之能原其始之所以生而要其終之所以死則輪回之說不辨自明矣致堂胡氏曰佛之言曰衆生各因淫欲而正性命使世人皆離此以證無生其不能然則愛為根本死於此生於彼或人而為畜畜而為人輪轉相尋無有窮己故人貴修行不殺免於報身隨念之善即生樂處欲驗其不然者請有以質之羽毛鱗介與夫􅀈耎肖翹之物在天地間抑有定數乎抑無定數乎若有定數則安知人死為畜畜死為人也若無定數則自古及今人與禽獸相為死生不過此數以大較論之人殺禽獸不可謂少矣禽獸能殺人者無幾是當禽獸日加多充滿于宇內人日加少遂至于無人然後報復之事信矣而有不然者太平之際人得其養海內之民以千萬計于時動物亦不可勝用若禽獸為人則禽獸宜凋耗而反加繁多喪亂之後人失其養或至千里人烟斷絶于時庶類亦不能獨茂若人為禽獸則禽獸宜繁多而反以凋耗此以目睹實事而質之者一也人之寐也氣不離形識知固在也而不能於寐之中自知其寐也其將寐也雖大聖人亦不能卓然知寐與寤之分際也死之異於寐也以方寤之時或呼之或觸之瞿然而覺也死則不能矣呼之觸之瞿然而覺然其寐之熟也則晦昧冥漠與死者無異又况於氣既離形如光之脫火知識泯滅不可復陽乃曰我有一念由吾所積皎皎然隨善惡所感而有所如往哉此又以聚散真理而質之者二也智者即是以思之則輪轉之有無亦可識矣朱子曰歸根本老氏語畢竟無歸這箇何曽動此性只是天地之性當初不是自彼來入此亦不是自往而復歸如月影在這盆水裏除了盆水這影便無了豈是這月影又飛上天去歸那月裏哉又如這花落便無些花了豈是歸去那裏明年又復來生枝上哉朱子曰人死終歸於散然亦未便散盡故祭祀有感格之理然已散者不可復聚釋氏却謂人死為鬼鬼復為人如此則天地間常只是許多氣來來去去更不由造化生生必無是理也問禮記言魂氣歸于天與張子形潰反原之說如何朱子曰魂氣歸于天是消散了正如火煙騰上有散而己論理大概是如此然亦有死而未遽散者亦有寃恨而未散者然亦不皆如此朱子曰死則氣散泯然無跡是其常也有託生者是偶然聚得不散乂去凑著那生氣亦能再生然非其常也問人死為禽獸恐無此理然嘗見永春人家生子耳上有猪毛猪皮者何也曰此不足怪向見籍溪借事一兵胸前有猪毛睡時作猪鳴此只是稟得猪氣耳朱子曰人呼氣時腹却脹吸氣時腹却厭論來呼而腹厭吸而腹脹乃是今若此者蓋呼氣時此一口氣雖出第二口氣已生故其腹脹及吸氣時其所生之氣又從裏趕出故其腹却厭大凡人生至死其氣只管出出盡便死知吸氣時非是吸外氣而入只是住得一霎時第二口氣又出若無得出時便死今按朱子此語尤可證輪回之說蓋所呼之氣既出而所吸之氣即生非謂所吸之氣即所呼之氣也造化之理生生不窮明乎此則輪回之說不足辨矣平巖葉氏曰精氣聚則為人散則為鬼散則漸滅就盡而已釋氏乃謂神識不散復寓形而受生是不明鬼之理也右論輪回生死之辨愚按輪回之說起於老佛之徒儒者非之是也然自聖賢之教不明於天下世俗之人惟老佛之言是信故南齊范縝嘗著論以辨之曰形者神之質神者形之用也神之於形猶利之於刀也未聞刀沒而利存豈容形亡而神在哉斯言有理故併録之理學類編卷六
